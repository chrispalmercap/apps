<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Score</title>
  <style>
    :root {
      --bg: #080d1a;
      --surface: #0f1729;
      --surface2: #162040;
      --border: rgba(100,160,255,0.12);
      --text: #e8f0fe;
      --text2: #8ba3c7;
      --muted: #4a6280;
      --shadow: 0 2px 24px rgba(0,0,0,0.5), 0 1px 8px rgba(0,0,0,0.3);
      --shadow-sm: 0 1px 10px rgba(0,0,0,0.3);
      --radius: 22px;
      --radius-sm: 14px;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(99,102,241,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 35% at 90% 105%, rgba(14,165,233,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59,130,246,0.05) 0%, transparent 70%),
        linear-gradient(160deg, #070b15 0%, #0d1a2e 60%, #070f1e 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }


    /* TOP BARS */
    #bar-home, #bar-detail {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px;
      background: rgba(7,11,21,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo  { font-size: 13px; font-weight: 900; letter-spacing: 1.5px; color: var(--text); }
    .t-date{ font-size: 11px; color: var(--muted); }
    .avatar{
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
    }
    .back-btn{
      background: none; border: none; color: var(--text2);
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 3px; padding: 0;
    }

    /* SCREEN TRANSITIONS */
    #v-home, #v-detail {
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s cubic-bezier(0.4,0,0.2,1);
      will-change: transform, opacity;
    }
    .screen-exit-left  { transform: translateX(-28%) !important; opacity: 0 !important; pointer-events: none !important; }
    .screen-enter-right{ transform: translateX(100%) !important; opacity: 0 !important; }
    .screen-enter-done { transform: translateX(0) !important;   opacity: 1 !important; }

    main { position: relative; z-index: 1; padding: 64px 16px 32px; }

    /* ── HOME ── */
    .score-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 22px 0 26px;
    }
    .score-lbl {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }
    .score-ring-wrap { position: relative; width: 160px; height: 160px; flex-shrink:0; }
    .score-ring-wrap svg { display: block; }
    .s-bg   { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
    .s-fill {
      fill: none; stroke-width: 10; stroke-linecap: round;
      stroke-dasharray: 408; stroke-dashoffset: 408;
      transition: stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1);
    }
    .score-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-num   { font-size: 52px; font-weight: 900; line-height: 1; }
    .score-denom { font-size: 13px; color: var(--muted); }
    .score-delta { font-size: 12px; font-weight: 700; margin-top: 14px; }

    .rings-lbl {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); text-align: center; margin-bottom: 12px;
    }
    .rings-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .ring-tile {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; padding: 10px 4px 8px; border-radius: 16px;
      width: calc((100% - 30px) / 4);
      transition: background 0.12s;
    }
    .ring-tile:active { background: rgba(0,0,0,0.04); }
    .rmini { position: relative; width: 56px; height: 56px; }
    .rmini svg { display: block; }
    .r-bg   { fill: none; stroke-width: 6; }
    .r-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.4s ease; }
    .r-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .r-val  { font-size: 12px; font-weight: 800; }
    .r-name { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; text-align: center; line-height: 1.2; }

    /* ── DETAIL ── */
    .d-hero {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 0 22px;
    }
    .d-ring-wrap { position: relative; width: 130px; height: 130px; margin-bottom: 12px; }
    .d-ring-wrap svg { display: block; }
    .d-bg   { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 11; }
    .d-fill {
      fill: none; stroke-width: 11; stroke-linecap: round;
      stroke-dasharray: 314; stroke-dashoffset: 314;
      transition: stroke-dashoffset 1s ease;
    }
    .d-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .d-val  { font-size: 28px; font-weight: 900; line-height: 1; }
    .d-unit { font-size: 11px; color: var(--muted); }
    .d-name  { font-size: 19px; font-weight: 900; color: var(--text); }
    .d-goal  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .d-trend {
      font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 14px;
      margin-top: 10px; display: inline-block;
    }

    /* shared section label */
    .sec { font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin: 18px 0 9px; }

    /* card */
    .gc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .gc-p { padding: 15px; }
    .gc-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .gc-row:last-child { border-bottom: none; }
    .gc-lbl { font-size: 13px; color: var(--text2); flex: 1; }
    .gc-val { font-size: 13px; font-weight: 700; text-align: right; max-width: 55%; color: var(--text); }
    .gc-val-sm { font-size: 12px; font-weight: 500; color: var(--muted); text-align: right; max-width: 55%; }

    /* why card */
    .why-gc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 15px; margin-bottom: 12px;
      font-size: 13px; color: var(--text2); line-height: 1.75;
      box-shadow: var(--shadow-sm);
    }
    .why-gc strong { color: var(--text); }

    /* body effects */
    .body-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .body-row:last-child { border-bottom: none; }
    .b-ic { font-size: 20px; flex-shrink: 0; }
    .b-tx { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .b-tx strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

    /* tip rows */
    .tip-row-d {
      display: flex; flex-direction: column; gap: 4px;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .tip-row-d:last-child { border-bottom: none; }
    .tip-head { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text); }
    .tip-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tip-desc { font-size: 12px; color: var(--muted); line-height: 1.6; padding-left: 15px; }

    /* ── LOG SECTION ── */
    .log-field { margin-bottom: 10px; }
    .log-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .log-row   { display: flex; gap: 8px; }
    .log-input {
      flex: 1; padding: 10px 13px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text); font-size: 14px; outline: none;
      font-family: inherit;
    }
    .log-input::placeholder { color: var(--muted); }
    .log-input:focus { border-color: rgba(0,0,0,0.15); background: var(--surface); }
    .log-add {
      padding: 10px 16px; border-radius: 12px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
      transition: opacity 0.15s;
    }
    .log-add:active { opacity: 0.75; }
    .quick-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .quick-btn {
      flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2);
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background 0.12s; font-family: inherit;
    }
    .quick-btn:active { background: var(--surface); }
    .log-entries { margin-top: 12px; }
    .log-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .log-entry:last-child { border-bottom: none; }
    .le-time { color: var(--muted); font-size: 12px; }
    .le-val  { font-weight: 700; color: var(--text); }
    .no-entries { font-size: 12px; color: var(--muted); text-align: center; padding: 10px 0 4px; }
    .log-toggle-btn { display: block; width: 100%; text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; background: none; border: none; cursor: pointer; padding: 8px 0 2px; font-family: inherit; }

    /* ── GOAL SECTION ── */
    .goal-mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .goal-mode-btn { flex: 1; padding: 7px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .goal-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .goal-card { background: var(--surface2); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
    .goal-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .goal-card-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
    .goal-type-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
    .goal-bar-wrap { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .goal-bar-fill { height: 100%; border-radius: 3px; transition: width 1.1s ease; }
    .goal-card-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .goal-complete-btn { font-size: 11px; font-weight: 700; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .goal-more-btn { width: 100%; text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; background: none; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; padding: 8px; font-family: inherit; margin-bottom: 12px; }
    .goal-add-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .goal-add-lbl { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .goal-add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .goal-input { flex: 1; padding: 9px 13px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .goal-input::placeholder { color: var(--muted); }
    .goal-input:focus { border-color: rgba(0,0,0,0.15); }
    .goal-add-btn { padding: 9px 14px; border-radius: 12px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff; font-family: inherit; }
    .goal-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .goal-sug-pill { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .goal-sug-pill:active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .target-edit-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .target-edit-lbl { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .target-edit-input { flex: 1; padding: 7px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
    .target-save-btn { padding: 7px 12px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; color: #fff; font-family: inherit; }
    /* ── DAY TRACKER ── */
    .tracker-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .tracker-col { display: flex; flex-direction: column; gap: 2px; }
    .tracker-lbl { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .tracker-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .tracker-note { font-size: 11px; color: var(--muted); }
    .tracker-pct { font-size: 12px; font-weight: 700; }
    .target-inline-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 0; line-height: 1; color: var(--muted); }
    .target-inline-btn:hover { color: var(--text); }

    /* ── FOOD / NUTRITION ── */
    .food-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .food-input {
      flex: 1; padding: 10px 13px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .food-input::placeholder { color: var(--muted); }
    .food-input:focus { border-color: rgba(0,0,0,0.15); }
    .food-add {
      padding: 10px 16px; border-radius: 12px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
    }
    .macro-bar-row { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .macro-line { display: flex; flex-direction: column; gap: 3px; }
    .macro-labels { display: flex; justify-content: space-between; font-size: 11px; }
    .macro-lbl { color: var(--muted); }
    .macro-pct { font-weight: 700; }
    .macro-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .macro-fill  { height: 100%; border-radius: 3px; transition: width 1s ease; }

    /* ── BODY DIAGRAM ── */
    .body-diag-wrap { margin-bottom: 4px; }
    .body-diag-gender { display: flex; gap: 6px; margin-bottom: 12px; }
    .body-diag-gender-btn {
      padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 11px; font-family: inherit; cursor: pointer;
    }
    .body-diag-gender-btn.active { background: var(--surface); color: var(--text); border-color: rgba(0,0,0,0.15); }
    .body-diag-gender-btn.male-btn.active { border-color: #06b6d4; color: #06b6d4; }
    .body-diag-gender-btn.female-btn.active { border-color: #ec4899; color: #ec4899; }
    .body-diag-layout { display: flex; gap: 12px; align-items: flex-start; }
    .body-diag-svg-col { flex-shrink: 0; width: 110px; }
    .body-diag-svg-col svg { width: 100%; height: auto; }
    .body-diag-cards { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .body-diag-card {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 8px 10px; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .body-diag-card:hover { background: var(--surface); }
    .body-diag-card.highlighted { background: var(--surface); border-color: rgba(0,0,0,0.12); }
    .b-ic { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .b-tx { flex: 1; min-width: 0; }
    .b-tx strong { font-size: 12px; font-weight: 700; color: var(--text); display: block; margin-bottom: 2px; }
    .b-tx span { font-size: 11px; color: var(--muted); line-height: 1.4; }

    .nutrition-item {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 11px 15px; border-bottom: 1px solid var(--border);
    }
    .nutrition-item:last-child { border-bottom: none; }
    .ni-icon { font-size: 20px; flex-shrink: 0; }
    .ni-text { font-size: 13px; color: var(--text2); line-height: 1.55; }
    .ni-text strong { display: block; color: var(--text); margin-bottom: 1px; }

    /* ── GRAPH ── */
    .graph-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
    .graph-period-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .graph-periods { display: flex; gap: 5px; flex-shrink: 0; }
    .graph-date-inline { display: flex; gap: 4px; align-items: center; margin-left: auto; }
    .gp-btn { padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; }
    .gp-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .graph-info-bar { display: none; }
    .graph-svg-wrap { position: relative; width: 100%; user-select: none; -webkit-user-select: none; cursor: crosshair; }
    .graph-svg-wrap svg { width: 100%; display: block; height: auto; }
    .gy-lbl { position: absolute; left: 3px; font-size: 11px; font-weight: 700; color: var(--muted); transform: translateY(-50%); pointer-events: none; line-height: 1; z-index: 1; background: rgba(8,13,26,0.85); padding: 0 3px; border-radius: 3px; font-family: inherit; }
    .g-cursor { position: absolute; top: 0; bottom: 0; width: 1.5px; pointer-events: none; opacity: 0; }
    .g-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; border: 2.5px solid white; pointer-events: none; opacity: 0; margin-left: -5px; margin-top: -5px; box-shadow: 0 1px 6px rgba(0,0,0,0.2); z-index: 3; }
    .g-tip { position: absolute; background: rgba(8,18,40,0.95); color: white; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: inherit; line-height: 1.5; pointer-events: none; opacity: 0; white-space: nowrap; z-index: 4; top: 4px; transition: opacity 0.15s; }
    .graph-date-input { padding: 4px 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 10px; font-family: inherit; outline: none; width: 100px; }
    .graph-date-apply { padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .graph-date-sep { font-size: 10px; color: var(--muted); }
    .graph-macro-toggle-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .gmt-btn { padding: 4px 11px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; font-family: inherit; opacity: 0.35; }
    .gmt-btn.active { opacity: 1; }

    /* ── BODY SCORE DETAIL ── */
    .bs-breakdown { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .bs-ring-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface2); border-radius: 10px; }
    .bs-ring-icon { font-size: 18px; width: 24px; text-align: center; }
    .bs-ring-name { font-size: 12px; color: var(--text2); flex: 1; }
    .bs-ring-bar-wrap { width: 80px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bs-ring-bar { height: 100%; border-radius: 3px; }
    .bs-ring-val { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }

    /* trend compare */
    .trend-toggles { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .trend-tog { padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; opacity: 0.5; color: var(--text2); }
    .trend-tog.on { opacity: 1; }

    /* blood tests */
    .blood-add-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .blood-select { flex: 1; min-width: 120px; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .blood-val-input { width: 80px; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }

function init() {
  var d = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  document.getElementById('nav-date').textContent = d;

  var s = SCORE.val, circ = 408, off = circ - circ * s / 100;
  var ring = document.getElementById('score-ring');
  var num  = document.getElementById('score-num');
  var delt = document.getElementById('score-delta');
  var col  = getScoreColor(s);
  ring.style.stroke = col;
  num.style.color = col;
  setTimeout(function() { ring.style.strokeDashoffset = off; }, 80);
  var n = 0, step = s / 60;
  var t = setInterval(function() {
    n = Math.min(n + step, s); num.textContent = Math.round(n);
    if (n >= s) clearInterval(t);
  }, 16);
  delt.textContent = (SCORE.delta >= 0 ? '↑ +' : '↓ ') + Math.abs(SCORE.delta) + ' from yesterday';
  delt.style.color = SCORE.delta >= 0 ? '#22c55e' : '#f87171';

  renderRingRow();
}

function getScoreColor(score) {
  // smooth gradient: red(0) → orange(50) → yellow(70) → green(85-100)
  var hue;
  if (score <= 50)      hue = (score / 50) * 28;
  else if (score <= 70) hue = 28 + ((score - 50) / 20) * 27;
  else if (score <= 85) hue = 55 + ((score - 70) / 15) * 25;
  else                  hue = 80 + ((score - 85) / 15) * 52;
  var sat = score <= 50 ? 90 : 85;
  var lit = score <= 50 ? 52 : 54;
  return 'hsl(' + hue.toFixed(1) + ',' + sat + '%,' + lit + '%)';
}

function updateRingDivider(color) {
  var el = document.getElementById('ring-divider-line');
  if (!el) return;
  el.style.background = 'linear-gradient(90deg,transparent 0%,' + color + 'aa 25%,' + color + ' 50%,' + color + 'aa 75%,transparent 100%)';
  el.style.boxShadow = '0 0 14px ' + color + '88,0 0 32px ' + color + '44,0 1px 0 rgba(255,255,255,0.08)';
}

var wheelActiveIdx = 0;

function renderRingRow() {
  var row = document.getElementById('ring-row');
  if (!row) return;
  var html = '';
  for (var i = 0; i < RINGS.length; i++) {
    var ring = RINGS[i];
    var Rv = 17, circ = +(2 * Math.PI * Rv).toFixed(2);
    var off = +(circ - circ * ring.pct).toFixed(2);
    var isActive = i === wheelActiveIdx;
    var pct = Math.round(ring.pct * 100) + '%';
    html += '<div class="ring-tile-h' + (isActive ? ' active' : '') + '" onclick="setWheelActive(' + i + ')">'
      + '<div class="rmini"><svg width="44" height="44" viewBox="0 0 44 44">'
      + '<circle class="r-bg" cx="22" cy="22" r="' + Rv + '" stroke="' + ring.color + '22"/>'
      + '<circle class="r-fill" cx="22" cy="22" r="' + Rv + '" stroke="' + ring.color + '"'
      + ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + circ + '"'
      + ' data-off="' + off + '" transform="rotate(-90 22 22)"/>'
      + '</svg><div class="r-icon">' + ring.icon + '</div></div>'
      + '<div class="r-pct" style="color:' + ring.color + '">' + pct + '</div>'
      + '<div class="r-name">' + ring.name + '</div>'
      + '</div>';
  }
  row.innerHTML = html;
  setTimeout(function() {
    var fills = row.querySelectorAll('.r-fill');
    for (var i = 0; i < fills.length; i++) {
      fills[i].style.strokeDashoffset = fills[i].getAttribute('data-off');
    }
  }, 200);
  updateRingDivider(RINGS[wheelActiveIdx].color);
  renderRingPreview(wheelActiveIdx);
}

function setWheelActive(idx) {
  wheelActiveIdx = idx;
  var tiles = document.querySelectorAll('.ring-tile-h');
  for (var i = 0; i < tiles.length; i++) {
    tiles[i].classList.toggle('active', i === idx);
  }
  updateRingDivider(RINGS[idx].color);
  renderRingPreview(idx);
}

function wheelStep(dir) {
  var next = (wheelActiveIdx + dir + RINGS.length) % RINGS.length;
  setWheelActive(next);
}

function submitLog(idx) {
  var input = document.getElementById('log-input-' + idx);
  var val = (input.value || '').trim();
  if (!val) return;
  var r = RINGS[idx];
  var unit = r.logConfig.unit ? ' ' + r.logConfig.unit : '';
  var now = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  var entry = [now + ' today', val + unit];
  getLog(r.name).unshift(entry);
  input.value = '';
  var numVal = parseFloat(val);
  if (!isNaN(numVal)) pushLogToGraph(idx, numVal);
  else refreshLogEntries(idx);
}

function logQuick(idx, oz) {
  var r = RINGS[idx];
  var now = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  getLog(r.name).unshift([now + ' today', oz + ' oz']);

}

function refreshLogEntries(idx) {
  var r = RINGS[idx];
  var lc = r.logConfig;
  var logEntries = getLog(r.name);
  var allEntries = logEntries.concat(lc.entries || []);
  var el = document.getElementById('log-entries-' + idx);
  if (!el) return;
  var SHOW = 3;
  var expanded = logExpandedState[idx];
  var visible = expanded ? allEntries : allEntries.slice(0, SHOW);
  var rows = visible.map(function(e) {
    return '<div class="log-entry"><span class="le-time">' + e[0] + '</span><span class="le-val">' + e[1] + '</span></div>';
  }).join('');
  var toggle = '';
  if (allEntries.length > SHOW) {
    if (expanded) {
      toggle = '<button class="log-toggle-btn" onclick="toggleLogHistory(' + idx + ')">Show less ▲</button>';
    } else {
      toggle = '<button class="log-toggle-btn" onclick="toggleLogHistory(' + idx + ')">' + (allEntries.length - SHOW) + ' more entries ▼</button>';
    }
  }
  el.innerHTML = rows + toggle;
}

var gCurrentIdx = null, gPeriod = '1M';
var gCustomFrom = null, gCustomTo = null;

// ring-specific scale for mock data
var RING_SCALES = [
  { base:49, amp:6,    min:35, max:75,  unit:'ms',         better:'high', target:55    },  // HRV
  { base:7,  amp:0.8,  min:4,  max:9.5, unit:'hrs',        better:'high', target:7.5   },  // Sleep
  { base:28, amp:18,   min:0,  max:70,  unit:'min',        better:'high', target:45    },  // Zone2
  { base:6800, amp:2200, min:1500, max:15000, unit:'steps', better:'high', nodec:true, target:8000 },  // Steps
  { base:72, amp:14,   min:40, max:100, unit:'%',          better:'high', nodec:true, target:85   },  // Macros
  { base:55, amp:25,   min:10, max:120, unit:'oz',         better:'high', nodec:true, target:80   },  // Water
  { base:63, amp:4,    min:50, max:78,  unit:'bpm',        better:'low',  nodec:true, target:60   },  // RHR
  { base:42, amp:3.5,  min:20, max:70,  unit:'ml/kg/min',  better:'high', target:45   },  // VO2Max
];

function genMockData(ringIdx) {
  var sc = RING_SCALES[ringIdx];
  var data = [];
  var val = sc.base;
  for (var i = 364; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    // gentle trend toward current ring value + noise
    val += (sc.base - val) * 0.03 + (Math.random() - 0.48) * sc.amp * 0.4;
    val = Math.max(sc.min, Math.min(sc.max, val));
    // some days missing (10%)
    if (Math.random() > 0.1) {
      data.push({ d: d, v: +val.toFixed(1) });
    }
  }
  return data;
}

// cache so we don't regenerate each render
var mockDataCache = {};
function getMockData(idx) {
  if (!mockDataCache[idx]) mockDataCache[idx] = genMockData(idx);
  return mockDataCache[idx];
}

function fmtVal(v, sc) {
  if (sc.nodec) return Math.round(v);
  return v < 10 ? v.toFixed(1) : v.toFixed(0);
}

function renderGoalSection(idx) {
  var r = RINGS[idx], col = r.color;
  var sc = RING_SCALES[idx];
  var gc = r.goalConfig;
  var mode = goalModes[idx] || 'active';
  var goals = getGoals(idx);
  var filtered = goals.filter(function(g){ return mode === 'archive' ? g.completed : !g.completed; });
  var showMore = goalShowMore[idx];
  var visible = showMore ? filtered : filtered.slice(0, 2);

  // current reading from graph data (last point)
  var cache = mockDataCache[idx];
  var currentVal = cache && cache.length ? cache[cache.length-1].v : parseFloat(gc.current) || sc.base;

  var html = '';

  // mode toggle
  html += '<div class="goal-mode-row">'
    + '<button class="goal-mode-btn'+(mode==='active'?' active':'')+'" onclick="setGoalMode('+idx+',\'active\')">Active</button>'
    + '<button class="goal-mode-btn'+(mode==='archive'?' active':'')+'" onclick="setGoalMode('+idx+',\'archive\')">Archive</button>'
    + '</div>';

  // goal cards
  if (!visible.length) {
    html += '<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">'+( mode==='archive'?'No completed goals yet':'No active goals — add one below')+'</div>';
  } else {
    for (var gi = 0; gi < visible.length; gi++) {
      var g = visible[gi];
      var pct = g.targetVal === g.startVal ? 100 : Math.max(0, Math.min(100, Math.round((currentVal - g.startVal) / (g.targetVal - g.startVal) * 100)));
      if (sc.better === 'low') pct = Math.max(0, Math.min(100, Math.round((g.startVal - currentVal) / (g.startVal - g.targetVal) * 100)));
      var tcol = GOAL_TYPE_COLORS[g.type] || col;
      html += '<div class="goal-card">'
        + '<div class="goal-card-top"><div class="goal-card-title">'+g.title+'</div>'
        + '<div class="goal-type-badge" style="background:'+tcol+'22;color:'+tcol+'">'+g.type+'</div></div>'
        + '<div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:'+pct+'%;background:'+col+'" data-w="'+pct+'"></div></div>'
        + '<div class="goal-card-meta"><span>'+pct+'% complete · '+g.targetVal+' '+sc.unit+' goal</span>'
        + (g.completed ? '' : '<button class="goal-complete-btn" onclick="completeGoal('+idx+','+g.id+')">✓ Mark done</button>')
        + '</div></div>';

    + '</div>'

  return '<div class="gc gc-p">'+html+'</div>';
}

function setGoalMode(idx, mode) {

function prefillGoal(idx, title) {
  var inp = document.getElementById('goal-input-'+idx);

}

function addUserGoal(idx) {
  var inp = document.getElementById('goal-input-'+idx);
  if (!inp || !inp.value.trim()) return;
  var sc = RING_SCALES[idx];
  var cache = mockDataCache[idx];
  var startVal = cache && cache.length ? cache[cache.length-1].v : sc.base;
  var title = inp.value.trim();
  var type = 'target';
  if (/train|perform|cardio|zone|workout/i.test(title)) type = 'training';
  else if (/health|stress|sleep|recover|longevity/i.test(title)) type = 'health';
  var goals = getGoals(idx);
  goals.push({ id: Date.now(), title: title, type: type, targetVal: sc.target, startVal: startVal, unit: sc.unit, completed: false });
  inp.value = '';
  setGoalMode(idx, goalModes[idx]||'active');
}

function completeGoal(idx, id) {
  var goals = getGoals(idx);
  for (var i=0;i<goals.length;i++) { if (goals[i].id===id) { goals[i].completed=true; break; } }
  setGoalMode(idx, goalModes[idx]||'active');
}

function buildDayTrackerHtml(idx) {
  var r = RINGS[idx], col = r.color, sc = RING_SCALES[idx];
  var cache = getMockData(idx);
  var currentVal = cache.length ? cache[cache.length-1].v : sc.base;
  var tgt = sc.target;
  var pct;
  if (sc.better === 'low') {
    pct = tgt >= sc.base ? 0 : Math.max(0, Math.min(100, Math.round((sc.base - currentVal) / (sc.base - tgt) * 100)));
  } else {
    pct = Math.max(0, Math.min(100, Math.round(tgt > 0 ? currentVal / tgt * 100 : 0)));
  }
  var tgtLabel = fmtVal(tgt, sc) + ' ' + sc.unit;
  var curLabel = fmtVal(currentVal, sc) + ' ' + sc.unit;
  var diff = sc.better === 'low' ? currentVal - tgt : tgt - currentVal;
  var note = diff <= 0 ? ('✓ On target') : (fmtVal(Math.abs(diff), sc) + ' ' + sc.unit + (sc.better === 'low' ? ' above' : ' below') + ' target');

  return '<div class="tracker-row">'
    + '<div class="tracker-col"><div class="tracker-lbl">Today</div><div class="tracker-val" style="color:'+col+'">'+curLabel+'</div></div>'
    + '<div class="tracker-col" style="align-items:flex-end"><div class="tracker-lbl">Target &nbsp;<button class="target-inline-btn" onclick="showTargetEdit('+idx+')" title="Edit target">✏️</button></div>'

    + '</div>'
    + '</div>'
    + '<div class="goal-bar-wrap" style="margin:0 0 6px"><div class="goal-bar-fill" style="width:'+pct+'%;background:'+col+'" data-w="'+pct+'"></div></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
    + '<div class="tracker-note">'+note+'</div>'
    + '<div class="tracker-pct" style="color:'+col+'">'+pct+'%</div>'
    + '</div>'
    + '<div id="target-edit-inline-'+idx+'" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
    + '<div class="target-edit-row" style="margin:0">'
    + '<input class="target-edit-input" id="goal-target-input-'+idx+'" type="number" placeholder="'+fmtVal(tgt,sc)+'">'
    + '<button class="target-save-btn" style="background:'+col+'" onclick="saveGoalTarget('+idx+')">Update</button>'
    + '</div>'
    + '</div>';
}

function toggleLogHistory(idx) {
  logExpandedState[idx] = !logExpandedState[idx];

}

function pushLogToGraph(idx, numVal) {
  var sc = RING_SCALES[idx];
  numVal = Math.max(sc.min, Math.min(sc.max, numVal));
  var now = new Date();
  var todayKey = getDayKey(now);
  if (!rawDayLogs[idx]) rawDayLogs[idx] = {};
  if (!rawDayLogs[idx][todayKey]) rawDayLogs[idx][todayKey] = [];
  rawDayLogs[idx][todayKey].push({ts: new Date(now.getTime()), v: +numVal.toFixed(1)});
  var agg = getAggForDay(idx, rawDayLogs[idx][todayKey]);
  var todayDate = new Date(); todayDate.setHours(12,0,0,0);
  var cache = getMockData(idx);
  for (var i = cache.length-1; i >= 0; i--) {
    if (Math.abs(cache[i].d.getTime()-todayDate.getTime()) < 43200000) { cache.splice(i,1); break; }
  }
  cache.push({d: new Date(todayDate.getTime()), v: agg});
  cache.sort(function(a,b){ return a.d - b.d; });
  refreshLogEntries(idx);
  var wrap = document.getElementById('tracker-wrap-'+idx);
  if (wrap) {
    wrap.innerHTML = buildDayTrackerHtml(idx);
    setTimeout(function(){
      var fills = wrap.querySelectorAll('.goal-bar-fill');
      for (var fi=0;fi<fills.length;fi++){var w=fills[fi].getAttribute('data-w');if(w)fills[fi].style.width=w+'%';}
    }, 50);
  }
  renderGraphInner(idx);
  setTimeout(function(){ initGraphHover(idx); }, 60);
}

// ── RAW DAY LOGS & AGGREGATION ──────────────────
var rawDayLogs = {}; // rawDayLogs[idx][dateKey] = [{ts:Date, v:number}, ...]
var SUM_RINGS = {1:true, 2:true, 3:true, 4:true, 5:true}; // sum for these; average for rest

function getDayKey(d) { return d.toISOString().split('T')[0]; }

function makeTs(h, m) { var d = new Date(); d.setHours(h, m, 0, 0); return d; }

function getAggForDay(idx, dayEntries) {
  if (!dayEntries || !dayEntries.length) return null;
  var sc = RING_SCALES[idx];
  if (SUM_RINGS[idx]) {
    var sum = 0;
    for (var i = 0; i < dayEntries.length; i++) sum += dayEntries[i].v;
    return +Math.min(sc.max, sum).toFixed(1);
  }
  var tot = 0;
  for (var i = 0; i < dayEntries.length; i++) tot += dayEntries[i].v;
  return +(tot / dayEntries.length).toFixed(1);
}

function seedSampleData() {
  var today = getDayKey(new Date());
  // HRV (idx 0) — average — 3 readings today
  rawDayLogs[0] = {};
  rawDayLogs[0][today] = [
    {ts: makeTs(7,15), v: 44.2},
    {ts: makeTs(12,30), v: 47.8},
    {ts: makeTs(18,0),  v: 50.1}
  ];
  // Sleep (idx 1) — sum — 1 reading (full night)
  rawDayLogs[1] = {};
  rawDayLogs[1][today] = [{ts: makeTs(7,0), v: 6.8}];
  // Zone 2 (idx 2) — sum — 2 sessions today
  rawDayLogs[2] = {};
  rawDayLogs[2][today] = [
    {ts: makeTs(7,0), v: 28},
    {ts: makeTs(17,30), v: 20}
  ];
  // Steps (idx 3) — sum — 3 sync points
  rawDayLogs[3] = {};
  rawDayLogs[3][today] = [
    {ts: makeTs(9,0),  v: 2800},
    {ts: makeTs(13,0), v: 3400},
    {ts: makeTs(17,30), v: 2600}
  ];
  // Water (idx 5) — sum — 4 drinks
  rawDayLogs[5] = {};
  rawDayLogs[5][today] = [
    {ts: makeTs(8,0),   v: 16},
    {ts: makeTs(11,30), v: 12},
    {ts: makeTs(14,0),  v: 24},
    {ts: makeTs(19,30), v: 16}
  ];
  // RHR (idx 6) — average — 3 readings
  rawDayLogs[6] = {};
  rawDayLogs[6][today] = [
    {ts: makeTs(6,45), v: 58},
    {ts: makeTs(12,30), v: 64},
    {ts: makeTs(21,0),  v: 61}
  ];
  // VO2 Max (idx 7) — average — 2 readings
  rawDayLogs[7] = {};
  rawDayLogs[7][today] = [
    {ts: makeTs(8,0),  v: 42.5},
    {ts: makeTs(18,0), v: 43.2}
  ];
  // inject aggregated values into mockDataCache
  var todayDate = new Date(); todayDate.setHours(12,0,0,0);
  for (var ri = 0; ri < 8; ri++) {
    if (!rawDayLogs[ri] || !rawDayLogs[ri][today]) continue;
    var agg = getAggForDay(ri, rawDayLogs[ri][today]);
    if (agg === null) continue;
    var cache = getMockData(ri);
    for (var ci = cache.length-1; ci >= 0; ci--) {
      if (Math.abs(cache[ci].d.getTime() - todayDate.getTime()) < 43200000) { cache.splice(ci,1); break; }
    }
    cache.push({d: new Date(todayDate.getTime()), v: agg});
    cache.sort(function(a,b){ return a.d - b.d; });
    // also add log display entries
    var r = RINGS[ri];
    var sc = RING_SCALES[ri];
    var entries = rawDayLogs[ri][today];
    var log = getLog(r.name);
    log.length = 0;
    for (var ei = entries.length-1; ei >= 0; ei--) {
      var ts = entries[ei].ts;
      var tstr = ts.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      log.push([tstr + ' today', fmtVal(entries[ei].v, sc) + ' ' + sc.unit]);
    }
  }
}

    + '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600">Or select a date range</div>'
    + '<div style="display:flex;gap:6px;align-items:center">'
    + '<input type="date" class="graph-date-input" id="gdate-from-' + idx + '" max="' + toStr + '" style="flex:1">'
    + '<span class="graph-date-sep">&#8594;</span>'
    + '<input type="date" class="graph-date-input" id="gdate-to-' + idx + '" max="' + toStr + '" style="flex:1">'
    + '<button class="graph-date-apply" onclick="applyDateRange(' + idx + ')">Go</button>'
    + '</div>'
    + '</div>'
    + macroToggles
    + '<div class="graph-info-bar" id="ginfo-' + idx + '"></div>'
    + '<div id="graph-inner-' + idx + '"></div>'
    + '</div>';
}

function toggleGraphCal(idx) {
  var panel = document.getElementById('graph-cal-' + idx);
  if (!panel) return;
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function jumpToDay(idx) {
  var inp = document.getElementById('gdate-day-' + idx);
  if (!inp || !inp.value) return;
  var dayKey = inp.value;
  var intradayPts = (rawDayLogs[idx] && rawDayLogs[idx][dayKey]) ? rawDayLogs[idx][dayKey] : [];
  var el = document.getElementById('graph-inner-' + idx);
  if (!el) return;
  if (intradayPts.length > 0) {
    el.innerHTML = renderIntradayGraph(intradayPts, idx);
  } else {
    var from3 = new Date(dayKey); from3.setHours(0,0,0,0);
    var to3 = new Date(dayKey); to3.setHours(23,59,59);
    var dayData = getMockData(idx).filter(function(p){ return p.d >= from3 && p.d <= to3; });
    if (!dayData.length) {
      var from7 = new Date(dayKey); from7.setDate(from7.getDate() - 3);
      var to7 = new Date(dayKey); to7.setDate(to7.getDate() + 4);
      dayData = getMockData(idx).filter(function(p){ return p.d >= from7 && p.d <= to7; });
    }
    el.innerHTML = renderLineGraph(dayData, idx);
  }
  var wrap = document.getElementById('graph-wrap-' + idx);
  if (wrap) {
    var btns = wrap.querySelectorAll('.gp-btn');
    for (var b = 0; b < btns.length; b++) btns[b].classList.remove('active');
  }
  setTimeout(function(){ initGraphHover(idx); }, 60);
}

function setGraphPeriod(p, idx) {
  gPeriod = p;
  var wrap = document.getElementById('graph-wrap-' + idx);
  if (!wrap) return;
  wrap.querySelectorAll('.gp-btn').forEach(function(b){ b.classList.toggle('active', b.textContent.trim() === p); });
  var fi = document.getElementById('gdate-from-' + idx);
  var ti = document.getElementById('gdate-to-' + idx);
  if (fi) fi.value = '';
  if (ti) ti.value = '';
  renderGraphInner(idx);
  setTimeout(function(){ initGraphHover(idx); }, 60);
}

function applyDateRange(idx) {
  var fi = document.getElementById('gdate-from-' + idx);
  var ti = document.getElementById('gdate-to-' + idx);
  if (!fi || !ti || !fi.value || !ti.value) return;
  var wrap = document.getElementById('graph-wrap-' + idx);
  if (wrap) wrap.querySelectorAll('.gp-btn').forEach(function(b){ b.classList.remove('active'); });
  gPeriod = 'custom';
  gCustomFrom = new Date(fi.value);
  gCustomTo   = new Date(ti.value);
  gCustomTo.setHours(23,59,59);
  renderGraphInner(idx);
  setTimeout(function(){ initGraphHover(idx); }, 60);
}

function renderGraphInner(idx) {
  var el = document.getElementById('graph-inner-' + idx);
  if (!el) return;
  var days = gPeriod === '1D' ? 1 : gPeriod === '7D' ? 7 : gPeriod === '1M' ? 30 : gPeriod === '3M' ? 90 : 365;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  function filterData(arr) {
    if (gPeriod === 'custom' && gCustomFrom && gCustomTo) {
      return arr.filter(function(p){ return p.d >= gCustomFrom && p.d <= gCustomTo; });
    }
    return arr.filter(function(p){ return p.d >= cutoff; });
  }
  if (idx === 4) {
    var mkeys = ['protein','carbs','fat','fiber'];
    var mseries = {};
    for (var mk = 0; mk < mkeys.length; mk++) mseries[mkeys[mk]] = filterData(getMacroSeries(mkeys[mk]));
    el.innerHTML = renderMacroGraph(mseries);
  } else if (gPeriod === '1D' && rawDayLogs[idx]) {
    var todayKey2 = getDayKey(new Date());
    var intradayPts = rawDayLogs[idx][todayKey2] || [];
    if (intradayPts.length > 0) {
      el.innerHTML = renderIntradayGraph(intradayPts, idx);
    } else {
      el.innerHTML = renderLineGraph(filterData(getMockData(idx)), idx);
    }
  } else {
    el.innerHTML = renderLineGraph(filterData(getMockData(idx)), idx);
  }
}

function renderIntradayGraph(entries, idx) {
  if (SUM_RINGS[idx]) {
    return renderAdditiveDayGraph(entries, idx);
  }
  var r = RINGS[idx], sc = RING_SCALES[idx], col = r.color;
  var sorted = entries.slice().sort(function(a,b){ return a.ts - b.ts; });
  if (!sorted.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">No data today</div>';
  var W = 360, H = 130, padT = 6, padB = 22, cH = H - padT - padB;
  var vals = sorted.map(function(e){ return e.v; });
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var vRange = maxV - minV || sc.amp * 0.5;
  var center = (sc.target !== undefined) ? sc.target : (minV + maxV) / 2;
  var spread = Math.max(vRange * 0.65, sc.amp * 1.5);
  var lo = Math.min(minV - vRange * 0.15, center - spread);
  var hi = Math.max(maxV + vRange * 0.15, center + spread);
  var vR = hi - lo;
  var n = sorted.length;
  function xp2(i){ return n > 1 ? (i / (n-1)) * W : W / 2; }
  function yp2(v){ return padT + cH - ((v - lo) / vR) * cH; }
  var pts = sorted.map(function(e, i){ return {d: e.ts, v: e.v, xp: xp2(i), yp: yp2(e.v)}; });
  gGraphData[idx] = {pts: pts, col: col, sc: sc, W: W, H: H, padT: padT, padB: padB, cH: cH, isIntraday: true};
  var linePath = pts.map(function(p,i){ return (i===0?'M':'L')+p.xp.toFixed(1)+','+p.yp.toFixed(1); }).join(' ');
  var areaPath = linePath+' L'+pts[pts.length-1].xp.toFixed(1)+','+(padT+cH)+' L'+pts[0].xp.toFixed(1)+','+(padT+cH)+' Z';
  var grid = '', yHtml = '';
  for (var t = 0; t <= 3; t++) {
    var tv = lo + (vR * t / 3), ty = yp2(tv);
    grid += '<line x1="0" y1="'+ty.toFixed(1)+'" x2="'+W+'" y2="'+ty.toFixed(1)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    var tvLabel = sc.unit === 'steps' ? Math.round(tv/1000)+'k' : fmtVal(tv, sc);
    yHtml += '<div class="gy-lbl" style="top:'+(ty/H*100).toFixed(1)+'%">'+tvLabel+'</div>';
  }
  var targetLine = '';
  if (sc.target !== undefined) {
    var ty3 = yp2(sc.target);
    if (ty3 >= padT && ty3 <= padT + cH) {
      targetLine = '<line x1="0" y1="'+ty3.toFixed(1)+'" x2="'+W+'" y2="'+ty3.toFixed(1)+'" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>';
      var tgtLabel2 = sc.unit === 'steps' ? Math.round(sc.target/1000)+'k' : (sc.nodec ? sc.target : sc.target);
      targetLine += '<rect x="'+(W-32)+'" y="'+(ty3-5)+'" width="30" height="10" rx="2" fill="#22c55e" opacity="0.9"/>';
      targetLine += '<text x="'+(W-17)+'" y="'+(ty3)+'" dominant-baseline="middle" fill="white" font-size="6.6" text-anchor="middle" font-weight="bold">'+tgtLabel2+' '+sc.unit+'</text>';
    }
  }
  var xLabels = '';
  for (var xi = 0; xi < pts.length; xi++) {
    var anchor = xi===0 ? 'start' : xi===pts.length-1 ? 'end' : 'middle';
    var tlbl = pts[xi].d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    xLabels += '<text x="'+pts[xi].xp.toFixed(1)+'" y="'+(H-4)+'" fill="#4a6280" font-size="6" font-weight="700" text-anchor="'+anchor+'">'+tlbl+'</text>';
  }
  var dots = '';
  for (var di = 0; di < pts.length; di++) {
    dots += '<circle cx="'+pts[di].xp.toFixed(1)+'" cy="'+pts[di].yp.toFixed(1)+'" r="3.5" fill="'+col+'" stroke="white" stroke-width="1.5"/>';
  }
  var gradId2 = 'gg'+idx+'d';
  return '<div class="graph-svg-wrap" id="ghit-'+idx+'">'
    + yHtml
    + '<svg id="gsvg-'+idx+'" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;">'
    + '<defs><linearGradient id="'+gradId2+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0.02"/></linearGradient></defs>'
    + grid + targetLine
    + '<path d="'+areaPath+'" fill="url(#'+gradId2+')"/>'
    + '<path d="'+linePath+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + xLabels
    + '</svg>'
    + '<div class="g-cursor" id="gcursor-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-dot" id="gdot-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-tip" id="gtip-'+idx+'"></div>'
    + '</div>';
}

function renderAdditiveDayGraph(entries, idx) {
  var r = RINGS[idx], sc = RING_SCALES[idx], col = r.color;
  var sorted = entries.slice().sort(function(a,b){ return a.ts - b.ts; });
  if (!sorted.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">No data today</div>';
  var W = 360, H = 130, padT = 6, padB = 22, cH = H - padT - padB;
  var running = 0;
  var cumPts = [];
  for (var i = 0; i < sorted.length; i++) {
    running += sorted[i].v;
    cumPts.push({ts: sorted[i].ts, v: Math.min(running, sc.max)});
  }
  var maxV = Math.max(sc.target * 1.15, cumPts[cumPts.length-1].v * 1.2, 1);
  var vR = maxV;
  var n = cumPts.length;
  function xp3(i){ return n > 1 ? (i / (n-1)) * W : W / 2; }
  function yp3(v){ return padT + cH - (v / vR) * cH; }
  var pts = cumPts.map(function(e, i){ return {d:e.ts, v:e.v, xp:xp3(i), yp:yp3(e.v)}; });
  gGraphData[idx] = {pts:pts, col:col, sc:sc, W:W, H:H, padT:padT, padB:padB, cH:cH, isIntraday:true};
  // Step-line path
  var linePath = '';
  for (var j = 0; j < pts.length; j++) {
    if (j === 0) { linePath += 'M' + pts[j].xp.toFixed(1) + ',' + pts[j].yp.toFixed(1); }
    else { linePath += ' H' + pts[j].xp.toFixed(1) + ' L' + pts[j].xp.toFixed(1) + ',' + pts[j].yp.toFixed(1); }
  }
  linePath += ' H' + W;
  var areaPath = linePath + ' L' + W + ',' + (padT+cH) + ' L0,' + (padT+cH) + ' Z';
  // Target line
  var ty3 = yp3(sc.target);
  var targetLine3 = '';
  if (ty3 >= padT && ty3 <= padT + cH) {
    var tgtLabel3 = sc.unit === 'steps' ? Math.round(sc.target/1000)+'k' : (sc.nodec ? sc.target : sc.target);
    targetLine3 = '<line x1="0" y1="'+ty3.toFixed(1)+'" x2="'+W+'" y2="'+ty3.toFixed(1)+'" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>';
    targetLine3 += '<rect x="'+(W-32)+'" y="'+(ty3-5)+'" width="30" height="10" rx="2" fill="#22c55e" opacity="0.9"/>';
    targetLine3 += '<text x="'+(W-17)+'" y="'+ty3+'" dominant-baseline="middle" fill="white" font-size="6.6" text-anchor="middle" font-weight="bold">'+tgtLabel3+' '+sc.unit+'</text>';
  }
  // Y labels
  var yHtml3 = '';
  for (var t3 = 0; t3 <= 2; t3++) {
    var tv3 = maxV * t3 / 2;
    var ty33 = yp3(tv3);
    var tvLabel3 = sc.unit === 'steps' ? Math.round(tv3/1000)+'k' : fmtVal(tv3, sc);
    yHtml3 += '<div class="gy-lbl" style="top:'+(ty33/H*100).toFixed(1)+'%">'+tvLabel3+'</div>';
  }
  // X labels
  var xLabels3 = '';
  var showPts = Math.min(4, pts.length);
  for (var xi3 = 0; xi3 < showPts; xi3++) {
    var pi3 = Math.round(xi3 * (pts.length - 1) / Math.max(showPts - 1, 1));
    var anchor3 = xi3 === 0 ? 'start' : xi3 === showPts-1 ? 'end' : 'middle';
    var tlbl3 = pts[pi3].d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    xLabels3 += '<text x="'+pts[pi3].xp.toFixed(1)+'" y="'+(H-4)+'" fill="#4a6280" font-size="6" font-weight="700" text-anchor="'+anchor3+'">'+tlbl3+'</text>';
  }
  var gradId3 = 'gadd'+idx;
  var runTotal = cumPts[cumPts.length-1].v;
  var runLabel = sc.unit === 'steps' ? (runTotal/1000).toFixed(1)+'k steps' : fmtVal(runTotal, sc) + ' ' + sc.unit;
  var pctDone = Math.min(100, Math.round(runTotal / sc.target * 100));
  var badge = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    + '<span style="font-size:11px;color:var(--muted)">Cumulative today</span>'
    + '<span style="font-size:13px;font-weight:800;color:'+col+'">'+runLabel
    + ' <span style="font-size:10px;font-weight:600;opacity:0.65">('+pctDone+'%)</span></span>'
    + '</div>';
  return badge
    + '<div class="graph-svg-wrap" id="ghit-'+idx+'">'
    + yHtml3
    + '<svg id="gsvg-'+idx+'" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;">'
    + '<defs><linearGradient id="'+gradId3+'" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.35"/>'
    + '<stop offset="100%" stop-color="'+col+'" stop-opacity="0.04"/>'
    + '</linearGradient></defs>'
    + targetLine3
    + '<path d="'+areaPath+'" fill="url(#'+gradId3+')"/>'
    + '<path d="'+linePath+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + xLabels3
    + '</svg>'
    + '<div class="g-cursor" id="gcursor-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-dot" id="gdot-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-tip" id="gtip-'+idx+'"></div>'
    + '</div>';
}

function renderLineGraph(data, idx) {
  if (!data.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">No data</div>';
  var r = RINGS[idx];
  var sc = RING_SCALES[idx];
  var col = r.color;
  // Full-width: no left/right padding — y-axis labels are HTML overlays
  var W = 360, H = 130, padT = 6, padB = 22;
  var cH = H - padT - padB;

  var vals = data.map(function(p){ return p.v; });
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var vRange = maxV - minV || 1;
  // center Y range on target so target line sits near the middle
  var center = (sc.target !== undefined) ? sc.target : (minV + maxV) / 2;
  var spread = Math.max(vRange * 0.65, sc.amp * 2.2);
  var lo = Math.min(minV - vRange * 0.08, center - spread);
  var hi = Math.max(maxV + vRange * 0.08, center + spread);
  var vR = hi - lo;

  function xp(i) { return data.length > 1 ? (i / (data.length - 1)) * W : W / 2; }
  function yp(v) { return padT + cH - ((v - lo) / vR) * cH; }

  var pts = data.map(function(p, i) { return { d: p.d, v: p.v, xp: xp(i), yp: yp(p.v) }; });
  gGraphData[idx] = { pts: pts, col: col, sc: sc, W: W, H: H, padT: padT, padB: padB, cH: cH };

  var linePath = pts.map(function(p, i){ return (i===0?'M':'L')+p.xp.toFixed(1)+','+p.yp.toFixed(1); }).join(' ');
  var areaPath = linePath+' L'+pts[pts.length-1].xp.toFixed(1)+','+(padT+cH)+' L'+pts[0].xp.toFixed(1)+','+(padT+cH)+' Z';

  // grid lines + y HTML labels
  var grid = '', yHtml = '';
  for (var t = 0; t <= 3; t++) {
    var tv = lo + (vR * t / 3), ty = yp(tv);
    grid += '<line x1="0" y1="'+ty.toFixed(1)+'" x2="'+W+'" y2="'+ty.toFixed(1)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    var tvLabel = sc.unit === 'steps' ? Math.round(tv/1000)+'k' : fmtVal(tv, sc);
    yHtml += '<div class="gy-lbl" style="top:'+(ty/H*100).toFixed(1)+'%">'+tvLabel+'</div>';
  }

  // target line (green, dashed) — only if target falls in visible range
  var targetLine = '';
  if (sc.target !== undefined) {
    var ty2 = yp(sc.target);
    if (ty2 >= padT && ty2 <= padT + cH) {
      targetLine = '<line x1="0" y1="'+ty2.toFixed(1)+'" x2="'+W+'" y2="'+ty2.toFixed(1)+'" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>';
      var tgtLabel = sc.unit === 'steps' ? Math.round(sc.target/1000)+'k' : (sc.nodec ? sc.target : sc.target);
      targetLine += '<rect x="'+(W-32)+'" y="'+(ty2-5)+'" width="30" height="10" rx="2" fill="#22c55e" opacity="0.9"/>';
      targetLine += '<text x="'+(W-17)+'" y="'+(ty2)+'" dominant-baseline="middle" fill="white" font-size="6.6" text-anchor="middle" font-weight="bold">'+tgtLabel+' '+sc.unit+'</text>';
    }
  }

  // x-axis labels: EVENLY SPACED positions, label from nearest data point
  var xLabels = '';
  var numX = Math.min(5, data.length);
  for (var xi = 0; xi < numX; xi++) {
    var xpos = numX > 1 ? (xi / (numX - 1)) * W : W / 2;
    var di = Math.min(data.length - 1, Math.round(xi * (data.length - 1) / Math.max(numX - 1, 1)));
    var lbl = pts[di].d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
    var anchor = xi === 0 ? 'start' : xi === numX-1 ? 'end' : 'middle';
    xLabels += '<text x="'+xpos.toFixed(1)+'" y="'+(H-4)+'" fill="#4a6280" font-size="6" font-weight="700" text-anchor="'+anchor+'">'+lbl+'</text>';
  }

  var gradId = 'gg'+idx;
  return '<div class="graph-svg-wrap" id="ghit-'+idx+'">'
    + yHtml
    + '<svg id="gsvg-'+idx+'" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;">'
    + '<defs><linearGradient id="'+gradId+'" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/>'
    + '<stop offset="100%" stop-color="'+col+'" stop-opacity="0.02"/>'
    + '</linearGradient></defs>'
    + grid
    + targetLine
    + '<path d="'+areaPath+'" fill="url(#'+gradId+')"/>'
    + '<path d="'+linePath+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + xLabels
    + '</svg>'
    + '<div class="g-cursor" id="gcursor-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-dot" id="gdot-'+idx+'" style="background:'+col+'"></div>'
    + '<div class="g-tip" id="gtip-'+idx+'"></div>'
    + '</div>';
}

function renderMacroGraph(series) {
  var keys = ['protein','carbs','fat','fiber'];
  var activeKeys = keys.filter(function(k){ return macroActive[k] && series[k] && series[k].length; });
  if (!activeKeys.length) return '<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">Select a macro above</div>';

  var W = 360, H = 130, padT = 6, padB = 22;
  var cH = H - padT - padB;

  var allPts = [];
  for (var ai = 0; ai < activeKeys.length; ai++) allPts = allPts.concat(series[activeKeys[ai]]);
  var allTimes = allPts.map(function(p){ return p.d.getTime(); });
  var minTime = Math.min.apply(null, allTimes), maxTime = Math.max.apply(null, allTimes);
  var timeRange = maxTime - minTime || 1;

  var allVals = allPts.map(function(p){ return p.v; });
  var minV = Math.min.apply(null, allVals), maxV = Math.max.apply(null, allVals);
  var vRange = maxV - minV || 1;
  // wider span so target lines sit inside the chart comfortably
  var lo = minV - vRange * 0.45, hi = maxV + vRange * 0.45, vR = hi - lo;

  function xpT(t) { return ((t - minTime) / timeRange) * W; }
  function ypV(v) { return padT + cH - ((v - lo) / vR) * cH; }

  var grid = '', yHtml = '';
  for (var t = 0; t <= 3; t++) {
    var tv = lo + (vR * t / 3), ty = ypV(tv);
    grid += '<line x1="0" y1="'+ty.toFixed(1)+'" x2="'+W+'" y2="'+ty.toFixed(1)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    yHtml += '<div class="gy-lbl" style="top:'+(ty/H*100).toFixed(1)+'%">'+Math.round(tv)+'g</div>';
  }

  var xLabels = '', numX = 5;
  for (var xi = 0; xi < numX; xi++) {
    var xpos2 = (xi / (numX - 1)) * W;
    var xt = minTime + (timeRange * xi / (numX - 1));
    var anchor = xi===0?'start':xi===numX-1?'end':'middle';
    xLabels += '<text x="'+xpos2.toFixed(1)+'" y="'+(H-4)+'" fill="#4a6280" font-size="6" font-weight="700" text-anchor="'+anchor+'">'+new Date(xt).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</text>';
  }

  // per-macro target lines
  var macroTargets = { protein:190, carbs:300, fat:78, fiber:25 };
  var targetLines = '';
  for (var mti = 0; mti < activeKeys.length; mti++) {
    var mtk = activeKeys[mti], mtv = macroTargets[mtk];
    if (mtv === undefined) continue;
    var mty = ypV(mtv);
    if (mty < padT || mty > padT + cH) continue;
    targetLines += '<line x1="0" y1="'+mty.toFixed(1)+'" x2="'+W+'" y2="'+mty.toFixed(1)+'" stroke="'+MACRO_DEFS[mtk].color+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>';
  }

  var paths = '', gdSeries = {};
  for (var si = 0; si < activeKeys.length; si++) {
    var k = activeKeys[si], def = MACRO_DEFS[k];
    var sorted = series[k].slice().sort(function(a,b){ return a.d - b.d; });
    var linePath = sorted.map(function(p,i){ return (i===0?'M':'L')+xpT(p.d.getTime()).toFixed(1)+','+ypV(p.v).toFixed(1); }).join(' ');
    var areaPath = linePath+' L'+xpT(sorted[sorted.length-1].d.getTime()).toFixed(1)+','+(padT+cH)+' L'+xpT(sorted[0].d.getTime()).toFixed(1)+','+(padT+cH)+' Z';
    var gid = 'gmg_'+k;
    paths += '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+def.color+'" stop-opacity="0.15"/><stop offset="100%" stop-color="'+def.color+'" stop-opacity="0"/></linearGradient></defs>';
    paths += '<path d="'+areaPath+'" fill="url(#'+gid+')"/>';
    paths += '<path d="'+linePath+'" fill="none" stroke="'+def.color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    gdSeries[k] = sorted.map(function(p){ return { d:p.d, v:p.v, xp:xpT(p.d.getTime()), yp:ypV(p.v) }; });
  }

  var dotDivs = '';
  for (var di = 0; di < activeKeys.length; di++) {
    dotDivs += '<div class="g-dot" id="gdot-4-'+activeKeys[di]+'" style="background:'+MACRO_DEFS[activeKeys[di]].color+'"></div>';
  }

  gGraphData[4] = { isMacro:true, series:gdSeries, activeKeys:activeKeys, W:W, H:H, padT:padT, padB:padB, cH:cH };

  return '<div class="graph-svg-wrap" id="ghit-4">'
    + yHtml
    + '<svg id="gsvg-4" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;">'
    + grid + targetLines + paths + xLabels
    + '</svg>'
    + dotDivs
    + '<div class="g-cursor" id="gcursor-4" style="background:#94a3b8"></div>'
    + '<div class="g-tip" id="gtip-4"></div>'
    + '</div>';
}

function initGraphHover(idx) {
  var gd = gGraphData[idx];
  if (!gd) return;
  var wrap = document.getElementById('ghit-' + idx);
  if (!wrap) return;

  var cachedRect = null;
  var rafPending = false;
  var pendingX = 0;

  function getRect() {
    if (!cachedRect) cachedRect = wrap.getBoundingClientRect();
    return cachedRect;
  }
  // invalidate cache on resize
  window.addEventListener('resize', function(){ cachedRect = null; }, {passive:true});

  function toSvgX(clientX) {
    var rect = getRect();
    var rel = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return rel * gd.W;
  }

  function pctL(svgX) { return (svgX / gd.W * 100).toFixed(2) + '%'; }
  function pctT(svgY) { return (svgY / gd.H * 100).toFixed(2) + '%'; }

  function placeTip(tip, svgX) {
    var leftPct = svgX / gd.W;
    // clamp so tip doesn't run off edge
    if (leftPct > 0.6) {
      tip.style.left = 'auto';
      tip.style.right = ((1 - leftPct) * 100).toFixed(1) + '%';
    } else {
      tip.style.right = 'auto';
      tip.style.left = (Math.max(0, leftPct * 100 - 4)).toFixed(1) + '%';
    }
  }

  function doUpdate() {
    rafPending = false;
    var svgX = toSvgX(pendingX);
    var cur = document.getElementById('gcursor-' + idx);
    var tip = document.getElementById('gtip-' + idx);

    if (gd.isMacro) {
      // find closest time by x
      var best0 = null, bestD0 = Infinity;
      for (var si = 0; si < gd.activeKeys.length; si++) {
        var pts0 = gd.series[gd.activeKeys[si]];
        for (var i0 = 0; i0 < pts0.length; i0++) {
          var dd0 = Math.abs(pts0[i0].xp - svgX);
          if (dd0 < bestD0) { bestD0 = dd0; best0 = pts0[i0]; }
        }
      }
      if (!best0) return;
      var targetTime = best0.d.getTime();
      var tipHtml = '', anchorXp = null;
      for (var si2 = 0; si2 < gd.activeKeys.length; si2++) {
        var k2 = gd.activeKeys[si2], pts2 = gd.series[k2];
        var bst = null, bstD = Infinity;
        for (var i2 = 0; i2 < pts2.length; i2++) {
          var dd2 = Math.abs(pts2[i2].d.getTime() - targetTime);
          if (dd2 < bstD) { bstD = dd2; bst = pts2[i2]; }
        }
        if (bst) {
          if (anchorXp === null) anchorXp = bst.xp;
          var dotEl = document.getElementById('gdot-4-' + k2);
          if (dotEl) { dotEl.style.left = pctL(bst.xp); dotEl.style.top = pctT(bst.yp); dotEl.style.opacity = '1'; }
          tipHtml += '<span style="color:'+MACRO_DEFS[k2].color+';font-weight:700">'+MACRO_DEFS[k2].label+': '+Math.round(bst.v)+'g</span>  ';
        }
      }
      if (cur && anchorXp !== null) { cur.style.left = pctL(anchorXp); cur.style.opacity = '1'; }
      if (tip && anchorXp !== null) {
        var ds0 = new Date(targetTime).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        tip.innerHTML = '<div style="font-size:10px;opacity:0.65;margin-bottom:3px">'+ds0+'</div>'+tipHtml;
        placeTip(tip, anchorXp); tip.style.opacity = '1';
      }
    } else {
      // find closest point by x
      var bpt = null, bptD = Infinity;
      for (var j = 0; j < gd.pts.length; j++) {
        var dj = Math.abs(gd.pts[j].xp - svgX);
        if (dj < bptD) { bptD = dj; bpt = gd.pts[j]; }
      }
      if (!bpt) return;
      var dot2 = document.getElementById('gdot-' + idx);
      if (cur) { cur.style.left = pctL(bpt.xp); cur.style.opacity = '1'; }
      if (dot2) { dot2.style.left = pctL(bpt.xp); dot2.style.top = pctT(bpt.yp); dot2.style.opacity = '1'; }
      if (tip) {
        var ds2;
        if (gd.isIntraday) {
          ds2 = bpt.d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        } else {
          ds2 = bpt.d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        }
        tip.innerHTML = '<div style="font-size:10px;opacity:0.65;margin-bottom:2px">'+ds2+'</div><strong style="color:'+gd.col+'">'+fmtVal(bpt.v,gd.sc)+' '+gd.sc.unit+'</strong>';
        placeTip(tip, bpt.xp); tip.style.opacity = '1';
      }
    }
  }

  function onMove(clientX) {
    pendingX = clientX;
    if (!rafPending) { rafPending = true; requestAnimationFrame(doUpdate); }
  }

  function onLeave() {
    var cur = document.getElementById('gcursor-' + idx);
    var dot = document.getElementById('gdot-' + idx);
    var tip = document.getElementById('gtip-' + idx);
    if (cur) cur.style.opacity = '0';
    if (dot) dot.style.opacity = '0';
    if (tip) tip.style.opacity = '0';
    if (gd.isMacro) {
      for (var i = 0; i < gd.activeKeys.length; i++) {
        var d = document.getElementById('gdot-4-' + gd.activeKeys[i]);
        if (d) d.style.opacity = '0';
      }
    }
  }

  wrap.addEventListener('mousemove', function(e){ onMove(e.clientX); });
  wrap.addEventListener('mouseleave', onLeave);
  wrap.addEventListener('touchstart', function(e){ e.preventDefault(); cachedRect = null; onMove(e.touches[0].clientX); }, {passive:false});
  wrap.addEventListener('touchmove', function(e){ e.preventDefault(); onMove(e.touches[0].clientX); }, {passive:false});
  wrap.addEventListener('touchend', function(){ setTimeout(onLeave, 600); });
}

var trendPeriod = '1M';

  renderTrendGraph();

function applyTrendDateRange() {
  var fi = document.getElementById('trend-date-from');
  var ti = document.getElementById('trend-date-to');
  if (!fi || !ti || !fi.value || !ti.value) return;
  trendCustomFrom = new Date(fi.value);
  trendCustomTo   = new Date(ti.value); trendCustomTo.setHours(23,59,59);
  trendPeriod = 'custom';
  document.querySelectorAll('.trend-toggles ~ .graph-periods .gp-btn').forEach(function(b){ b.classList.remove('active'); });
  renderTrendGraph();
}

function toggleTrend(i) {
  trendActive[i] = !trendActive[i];
  var btns = document.querySelectorAll('.trend-tog');
  if (btns[i]) btns[i].classList.toggle('on', trendActive[i]);
  renderTrendGraph();
}

function renderTrendGraph() {
  var svg = document.getElementById('trend-svg');
  if (!svg) return;
  var days = trendPeriod === '7D' ? 7 : trendPeriod === '3M' ? 90 : trendPeriod === '1Y' ? 365 : 30;
  var W = 340, H = 150, padL = 24, padR = 8, padT = 8, padB = 24;
  var cW = W - padL - padR, cH = H - padT - padB;
  var cutoff;
  if (trendPeriod !== 'custom') {
    cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  }

  var html = '';
  var t;
  for (t = 0; t <= 2; t++) {
    var ty = padT + cH - (cH * t / 2);
    html += '<line x1="' + padL + '" y1="' + ty + '" x2="' + (W-padR) + '" y2="' + ty + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    html += '<text x="' + (padL-2) + '" y="' + (ty+3) + '" fill="#7a9480" font-size="7" text-anchor="end">' + (t*50) + '</text>';
  }

  for (var ri = 0; ri < RINGS.length; ri++) {
    if (!trendActive[ri]) continue;
    var allData = getMockData(ri);
    var data = (trendPeriod === 'custom' && trendCustomFrom && trendCustomTo)
      ? allData.filter(function(p){ return p.d >= trendCustomFrom && p.d <= trendCustomTo; })
      : allData.filter(function(p){ return p.d >= cutoff; });
    if (data.length < 2) continue;
    var sc = RING_SCALES[ri];
    var ringColor = RINGS[ri].color;
    var linePath = data.map(function(p, j) {
      var x = padL + (j/(data.length-1))*cW;
      var n = (p.v - sc.min)/(sc.max - sc.min)*100;
      if (sc.better === 'low') n = 100 - n;
      var y = padT + cH - (Math.max(0,Math.min(100,n))/100)*cH;
      return (j===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    html += '<path d="' + linePath + '" fill="none" stroke="' + ringColor + '" stroke-width="1.5" stroke-linejoin="round" opacity="0.75"/>';
  }

  var effectiveDays = (trendPeriod === 'custom' && trendCustomFrom && trendCustomTo)
    ? Math.ceil((trendCustomTo - trendCustomFrom) / 86400000)
    : days;
  var step = Math.max(1, Math.floor(effectiveDays / 4));
  var startDate = (trendPeriod === 'custom' && trendCustomFrom) ? new Date(trendCustomFrom) : (function(){ var d = new Date(); d.setDate(d.getDate() - days); return d; })();
  for (var di = 0; di <= effectiveDays; di += step) {
    var lx = padL + (di/effectiveDays)*cW;
    var ld = new Date(startDate); ld.setDate(ld.getDate() + di);
    html += '<text x="' + lx + '" y="' + (H-6) + '" fill="#7a9480" font-size="7" text-anchor="middle">' + ld.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '</text>';
  }

  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  svg.innerHTML = html;
}

function calcDayScore(yr, mo, dy) {
  var target = new Date(yr, mo, dy);
  var total = 0, count = 0;
  for (var i = 0; i < RINGS.length; i++) {
    var dayData = getMockData(i);
    var sc = RING_SCALES[i];
    var closest = null;
    for (var k = 0; k < dayData.length; k++) {
      if (!closest || Math.abs(dayData[k].d - target) < Math.abs(closest.d - target)) closest = dayData[k];
    }
    if (closest && Math.abs(closest.d - target) < 86400000 * 2) {
      var n = (closest.v - sc.min) / (sc.max - sc.min) * 100;
      if (sc.better === 'low') n = 100 - n;
      total += Math.max(0, Math.min(100, n));
      count++;
    }
  }
  return count > 0 ? Math.round(total / count) : null;
}

function buildBsCalHtml() {

function renderBsCalInner() {
  var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    + '<button onclick="bsCalNav(-1)">&#8249;</button>'
    + '<span class="bs-cal-month">' + monthNames[bsCalMonth] + ' ' + bsCalYear + '</span>'
    + '<button onclick="bsCalNav(1)">&#8250;</button>'
    + '</div>';

  var firstDay = new Date(bsCalYear, bsCalMonth, 1).getDay();
  var daysInMonth = new Date(bsCalYear, bsCalMonth+1, 0).getDate();
  var today = new Date();

  var lbls = '<div class="bs-cal-grid">' + ['S','M','T','W','T','F','S'].map(function(l){ return '<div class="bs-cal-day-lbl">' + l + '</div>'; }).join('') + '</div>';

  var cells = '<div class="bs-cal-grid">';
  var e, d;
  for (e = 0; e < firstDay; e++) cells += '<div class="bs-cal-cell empty"></div>';
  for (d = 1; d <= daysInMonth; d++) {
    var key = bsCalYear + '-' + bsCalMonth + '-' + d;
    var isToday = (today.getDate()===d && today.getMonth()===bsCalMonth && today.getFullYear()===bsCalYear);
    var isSel   = bsCalSelected === key;
    var dayScore = calcDayScore(bsCalYear, bsCalMonth, d);
    var scoreHtml = '';
    if (dayScore !== null) {
      var sc = dayScore >= 75 ? '#4ade80' : dayScore >= 50 ? '#facc15' : '#f87171';
      scoreHtml = '<div style="font-size:14px;font-weight:900;color:' + sc + ';line-height:1;margin-top:2px">' + dayScore + '</div>';
    }
    cells += '<div class="bs-cal-cell' + (isToday?' today':'') + '" style="' + (isSel?'background:#e8f5e9;border-color:#22c55e;':'') + '" onclick="selectBsCalDay(\'' + key + '\')">'
      + '<div class="bs-cal-dn">' + d + '</div>'
      + scoreHtml
      + '</div>';
  }
  cells += '</div>';

  var expandHtml = '<div class="bs-cal-expand' + (bsCalSelected ? ' open' : '') + '" id="bs-cal-expand">'
    + renderBsCalExpand()
    + '</div>';

  return navHtml + lbls + cells + expandHtml;

function renderBsCalExpand() {
  if (!bsCalSelected) return '';
  var parts = bsCalSelected.split('-');
  var yr = parseInt(parts[0]), mo = parseInt(parts[1]), dy = parseInt(parts[2]);
  var target = new Date(yr, mo, dy);
  var rows = RINGS.map(function(r) {
    var i = RINGS.indexOf(r);

    var closest = null;
    var k;

      var diff = Math.abs(dayData[k].d - target);
      if (!closest || diff < Math.abs(closest.d - target)) closest = dayData[k];
    }
    var val = closest && Math.abs(closest.d - target) < 86400000*2 ? fmtVal(closest.v, RING_SCALES[i]) + ' ' + RING_SCALES[i].unit : 'No data';
    return '<div class="bs-cal-exp-row"><span>' + r.icon + ' ' + r.name + '</span><span style="color:' + r.color + ';font-weight:700">' + val + '</span></div>';
  }).join('');
  var dateStr = new Date(yr, mo, dy).toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric'});
  return '<div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#3a5040">' + dateStr + '</div>' + rows;
}

function selectBsCalDay(key) {
  bsCalSelected = (bsCalSelected === key) ? null : key;
  refreshBsCal();
}

function bsCalNav(dir) {
  bsCalMonth += dir;
  if (bsCalMonth > 11) { bsCalMonth = 0; bsCalYear++; }
  if (bsCalMonth < 0)  { bsCalMonth = 11; bsCalYear--; }
  bsCalSelected = null;
  refreshBsCal();
}

function refreshBsCal() {
  var el = document.getElementById('bs-cal-section');
  if (el) el.innerHTML = renderBsCalInner();
}

function buildBloodHtml() {
  return '<div class="gc" id="blood-section">' + renderBloodInner() + '</div>';
}

function renderBloodInner() {
  var opts = BLOOD_TESTS_DEF.map(function(t){ return '<option>' + t.name + '</option>'; }).join('');
  var today = new Date().toISOString().split('T')[0];
  var addRow = '<div style="padding:12px 15px;border-bottom:1px solid rgba(0,0,0,0.07)">'
    + '<div class="blood-add-row">'
    + '<select class="blood-select" id="blood-test-sel">' + opts + '</select>'
    + '<input type="number" class="blood-val-input" id="blood-val-inp" placeholder="Value">'
    + '<input type="date" class="blood-date-input" id="blood-date-inp" value="' + today + '" max="' + today + '">'
    + '<button class="blood-add-btn" onclick="addBloodEntry()">+ Add</button>'
    + '</div></div>';
  var entries = bloodEntries.length
    ? bloodEntries.map(function(e) {
        var def = null;
        var bk;
        for (bk = 0; bk < BLOOD_TESTS_DEF.length; bk++) { if (BLOOD_TESTS_DEF[bk].name === e.name) { def = BLOOD_TESTS_DEF[bk]; break; } }
        var col = '#7a9480';
        if (def) {
          for (var rk = 0; rk < def.ranges.length; rk++) {
            var rng = def.ranges[rk];
            if (e.val >= rng[0] && e.val < rng[1]) { col = rng[2]; break; }
          }
        }
        var unit = def ? def.unit : '';
        var refText = def ? getRangeLabel(def, e.val) : '';
        return '<div class="blood-entry">'
          + '<div class="blood-dot" style="background:' + col + '"></div>'
          + '<div class="blood-name">' + e.name + '</div>'
          + '<div><div class="blood-val-lbl" style="color:' + col + '">' + e.val + ' ' + unit + '</div>'
          + '<div class="blood-date-lbl">' + e.date + '</div></div>'
          + '<div class="blood-range-lbl">' + refText + '</div>'
          + '</div>';
      }).join('')
    : '<div class="no-data-msg">No blood tests logged yet</div>';
  return addRow + entries;
}

function getRangeLabel(def, val) {
  for (var k = 0; k < def.ranges.length; k++) {
    var r = def.ranges[k];
    if (val >= r[0] && val < r[1]) {
      if (r[2] === '#4ade80') return '✓ Normal';
      if (r[2] === '#facc15') return '⚠ Borderline';
      if (r[2] === '#f87171') return '✗ Out of range';
    }
  }
  return '';
}

function addBloodEntry() {
  var name = document.getElementById('blood-test-sel').value;
  var val  = parseFloat(document.getElementById('blood-val-inp').value);
  var date = document.getElementById('blood-date-inp').value;
  if (!name || isNaN(val) || !date) return;
  bloodEntries.unshift({ name:name, val:val, date:date });
  saveBlood();
  var sec = document.getElementById('blood-section');
  if (sec) sec.innerHTML = renderBloodInner();
}

function buildCondHtml() {
  return '<div class="gc" id="cond-section">' + renderCondInner() + '</div>';
}

function renderCondInner() {
  var addRow = '<div style="padding:12px 15px;border-bottom:1px solid rgba(0,0,0,0.07)">'
    + '<div class="cond-add-row">'
    + '<input type="text" class="cond-input" id="cond-name-inp" placeholder="e.g. Type 2 Diabetes, Hypertension...">'
    + '<select class="cond-status-sel" id="cond-status-sel">'
    + '<option value="Active">Active</option><option value="Monitoring">Monitoring</option><option value="Resolved">Resolved</option>'
    + '</select>'
    + '<button class="cond-add-btn" onclick="addCondition()">+ Add</button>'
    + '</div></div>';
  var statusColors = { Active:'#f87171', Monitoring:'#facc15', Resolved:'#4ade80' };
  var entries = conditions.length
    ? conditions.map(function(c, ci) {
        var col = statusColors[c.status] || '#7a9480';
        return '<div class="cond-pill">'
          + '<span class="cond-status" style="background:' + col + '22;color:' + col + '">' + c.status + '</span>'
          + '<span class="cond-name-lbl">' + c.name + '</span>'
          + '<button class="cond-del" onclick="deleteCondition(' + ci + ')">&#215;</button>'
          + '</div>';
      }).join('')
    : '<div class="no-data-msg" style="padding:12px 15px">No conditions logged</div>';
  return addRow + '<div style="padding:10px 15px 6px">' + entries + '</div>';
}

function addCondition() {
  var name   = (document.getElementById('cond-name-inp').value || '').trim();
  var status = document.getElementById('cond-status-sel').value;
  if (!name) return;
  conditions.unshift({ name:name, status:status });
  saveConds();
  var sec = document.getElementById('cond-section');
  if (sec) sec.innerHTML = renderCondInner();
  document.getElementById('cond-name-inp').value = '';
}

function deleteCondition(i) {
  conditions.splice(i, 1);
  saveConds();
  var panel = document.getElementById('profile-panel');
  if (panel && panel.style.display !== 'none') {
    switchProfileTab('conditions');
  } else {
    var sec = document.getElementById('cond-section');
    if (sec) sec.innerHTML = renderCondInner();
  }
}

function setBodyDiagGender(g, btn) {
  bdGender = g;
  var btns = document.querySelectorAll('.body-diag-gender-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('active', btns[i] === btn);

        var col2 = ov2 ? ov2.color : '#7a9480';

function toggleBodyDiagSys(itemIdx, sysId, el) {
  if (bdSelectedSys === sysId) {
    bdSelectedSys = null;
  } else {
    bdSelectedSys = sysId;
  }
  var cards = document.querySelectorAll('.body-diag-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('highlighted');
  if (bdSelectedSys && el) el.classList.add('highlighted');
  updateBodyDiagOverlays(bdCurrentIdx);
}

function updateBodyDiagOverlays(idx) {
  var g = document.getElementById('bd-overlays-' + idx);
  if (!g) return;
  var r = RINGS[idx];
  var toShow = bdSelectedSys ? [bdSelectedSys] : r.body.map(function(b){ return b[3]; }).filter(function(v,i,a){ return a.indexOf(v)===i; });
  var html = '';
  for (var i = 0; i < toShow.length; i++) {
    var sysId = toShow[i];
    if (sysId === 'reproductive') sysId = bdGender === 'f' ? 'reproductive-f' : 'reproductive-m';
    var ov = BD_OVERLAYS[sysId];
    if (ov) html += ov.svg;
  }
  g.innerHTML = html;
}

function buildBodyDiagHtml(idx) {
  var r = RINGS[idx];
  bdCurrentIdx = idx;

  var uniqueSys = r.body.map(function(b){ return b[3]; }).filter(function(v,i,a){ return a.indexOf(v)===i; });

  for (var i = 0; i < uniqueSys.length; i++) {

  }

  var outline = bdGender === 'f' ? BD_OUTLINE_F : BD_OUTLINE_M;
