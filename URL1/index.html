<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Score</title>
  <style>
    :root {
      --bg: #080d1a;
      --surface: #0f1729;
      --surface2: #162040;
      --border: rgba(100,160,255,0.12);
      --text: #e8f0fe;
      --text2: #8ba3c7;
      --muted: #4a6280;
      --shadow: 0 2px 24px rgba(0,0,0,0.5), 0 1px 8px rgba(0,0,0,0.3);
      --shadow-sm: 0 1px 10px rgba(0,0,0,0.3);
      --radius: 22px;
      --radius-sm: 14px;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(99,102,241,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 35% at 90% 105%, rgba(14,165,233,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59,130,246,0.05) 0%, transparent 70%),
        linear-gradient(160deg, #070b15 0%, #0d1a2e 60%, #070f1e 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }


    /* TOP BARS */
    #bar-home, #bar-detail {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px;
      background: rgba(7,11,21,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo  { font-size: 13px; font-weight: 900; letter-spacing: 1.5px; color: var(--text); }
    .t-date{ font-size: 11px; color: var(--muted); }
    .avatar{
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: #fff;
    }
    .back-btn{
      background: none; border: none; color: var(--text2);
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 3px; padding: 0;
    }

    /* SCREEN TRANSITIONS */
    #v-home, #v-detail {
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s cubic-bezier(0.4,0,0.2,1);
      will-change: transform, opacity;
    }
    .screen-exit-left  { transform: translateX(-28%) !important; opacity: 0 !important; pointer-events: none !important; }
    .screen-enter-right{ transform: translateX(100%) !important; opacity: 0 !important; }
    .screen-enter-done { transform: translateX(0) !important;   opacity: 1 !important; }

    main { position: relative; z-index: 1; padding: 64px 16px 32px; }

    /* ── HOME ── */
    .score-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 22px 0 26px;
    }
    .score-lbl {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }
    .score-ring-wrap { position: relative; width: 160px; height: 160px; flex-shrink:0; }
    .score-ring-wrap svg { display: block; }
    .s-bg   { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
    .s-fill {
      fill: none; stroke-width: 10; stroke-linecap: round;
      stroke-dasharray: 408; stroke-dashoffset: 408;
      transition: stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1);
    }
    .score-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .score-num   { font-size: 52px; font-weight: 900; line-height: 1; }
    .score-denom { font-size: 13px; color: var(--muted); }
    .score-delta { font-size: 12px; font-weight: 700; margin-top: 14px; }

    .rings-lbl {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); text-align: center; margin-bottom: 12px;
    }
    .rings-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .ring-tile {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer; padding: 10px 4px 8px; border-radius: 16px;
      width: calc((100% - 30px) / 4);
      transition: background 0.12s;
    }
    .ring-tile:active { background: rgba(0,0,0,0.04); }
    .rmini { position: relative; width: 56px; height: 56px; }
    .rmini svg { display: block; }
    .r-bg   { fill: none; stroke-width: 6; }
    .r-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.4s ease; }
    .r-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .r-val  { font-size: 12px; font-weight: 800; }
    .r-name { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; text-align: center; line-height: 1.2; }

    /* ── DETAIL ── */
    .d-hero {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 0 22px;
    }
    .d-ring-wrap { position: relative; width: 130px; height: 130px; margin-bottom: 12px; }
    .d-ring-wrap svg { display: block; }
    .d-bg   { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 11; }
    .d-fill {
      fill: none; stroke-width: 11; stroke-linecap: round;
      stroke-dasharray: 314; stroke-dashoffset: 314;
      transition: stroke-dashoffset 1s ease;
    }
    .d-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .d-val  { font-size: 28px; font-weight: 900; line-height: 1; }
    .d-unit { font-size: 11px; color: var(--muted); }
    .d-name  { font-size: 19px; font-weight: 900; color: var(--text); }
    .d-goal  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .d-trend {
      font-size: 11px; font-weight: 700; padding: 4px 14px; border-radius: 14px;
      margin-top: 10px; display: inline-block;
    }

    /* shared section label */
    .sec { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text2); margin: 14px 0 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px; }
    .sec::after { content: '▾'; font-size: 13px; letter-spacing: 0; text-transform: none; opacity: 0.6; transition: transform 0.2s; }
    .sec.collapsed::after { transform: rotate(-90deg); }
    .sec-body.collapsed { display: none; }

    /* card */
    .gc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }
    .gc-p { padding: 15px; }
    .gc-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .gc-row:last-child { border-bottom: none; }
    .gc-lbl { font-size: 13px; color: var(--text2); flex: 1; }
    .gc-val { font-size: 13px; font-weight: 700; text-align: right; max-width: 55%; color: var(--text); }
    .gc-val-sm { font-size: 12px; font-weight: 500; color: var(--text2); text-align: right; max-width: 55%; }

    /* why card */
    .why-gc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 15px; margin-bottom: 12px;
      font-size: 13px; color: var(--text2); line-height: 1.75;
      box-shadow: var(--shadow-sm);
    }
    .why-gc strong { color: var(--text); }

    /* body effects */
    .body-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .body-row:last-child { border-bottom: none; }
    .b-ic { font-size: 20px; flex-shrink: 0; }
    .b-tx { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .b-tx strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

    /* tip rows */
    .tip-row-d {
      display: flex; flex-direction: column; gap: 4px;
      padding: 12px 15px; border-bottom: 1px solid var(--border);
    }
    .tip-row-d:last-child { border-bottom: none; }
    .tip-head { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text); }
    .tip-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tip-desc { font-size: 12px; color: var(--text2); line-height: 1.55; padding-left: 15px; }

    /* ── LOG SECTION ── */
    .log-field { margin-bottom: 10px; }
    .log-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .log-row   { display: flex; gap: 8px; }
    .log-input {
      flex: 1; padding: 10px 13px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text); font-size: 14px; outline: none;
      font-family: inherit;
    }
    .log-input::placeholder { color: var(--muted); }
    .log-input:focus { border-color: rgba(0,0,0,0.15); background: var(--surface); }
    .log-add {
      padding: 10px 16px; border-radius: 12px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
      transition: opacity 0.15s;
    }
    .log-add:active { opacity: 0.75; }
    .quick-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .quick-btn {
      flex: 1; padding: 9px 4px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2);
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background 0.12s; font-family: inherit;
    }
    .quick-btn:active { background: var(--surface); }
    .log-entries { margin-top: 12px; }
    .log-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .log-entry:last-child { border-bottom: none; }
    .le-time { color: var(--muted); font-size: 12px; }
    .le-val  { font-weight: 700; color: var(--text); }
    .no-entries { font-size: 12px; color: var(--muted); text-align: center; padding: 10px 0 4px; }
    .log-toggle-btn { display: block; width: 100%; text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; background: none; border: none; cursor: pointer; padding: 8px 0 2px; font-family: inherit; }

    /* ── GOAL SECTION ── */
    .goal-mode-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .goal-mode-btn { flex: 1; padding: 7px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .goal-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .goal-card { background: var(--surface2); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
    .goal-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .goal-card-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
    .goal-type-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
    .goal-bar-wrap { height: 6px; background: rgba(0,0,0,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .goal-bar-fill { height: 100%; border-radius: 3px; transition: width 1.1s ease; }
    .goal-card-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .goal-complete-btn { font-size: 11px; font-weight: 700; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .goal-more-btn { width: 100%; text-align: center; font-size: 12px; color: var(--accent); font-weight: 700; background: none; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; padding: 8px; font-family: inherit; margin-bottom: 12px; }
    .goal-add-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .goal-add-lbl { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .goal-add-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .goal-input { flex: 1; padding: 9px 13px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; font-family: inherit; }
    .goal-input::placeholder { color: var(--muted); }
    .goal-input:focus { border-color: rgba(0,0,0,0.15); }
    .goal-add-btn { padding: 9px 14px; border-radius: 12px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; color: #fff; font-family: inherit; }
    .goal-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .goal-sug-pill { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .goal-sug-pill:active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .target-edit-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .target-edit-lbl { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .target-edit-input { flex: 1; padding: 7px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; outline: none; font-family: inherit; }
    .target-save-btn { padding: 7px 12px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; color: #fff; font-family: inherit; }
    /* ── DAY TRACKER ── */
    .tracker-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .tracker-col { display: flex; flex-direction: column; gap: 2px; }
    .tracker-lbl { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .tracker-val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .tracker-note { font-size: 11px; color: var(--muted); }
    .tracker-pct { font-size: 12px; font-weight: 700; }
    .target-inline-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 0; line-height: 1; color: var(--muted); }
    .target-inline-btn:hover { color: var(--text); }

    /* ── FOOD / NUTRITION ── */
    .food-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .food-input {
      flex: 1; padding: 10px 13px; border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 14px; outline: none; font-family: inherit;
    }
    .food-input::placeholder { color: var(--muted); }
    .food-input:focus { border-color: rgba(0,0,0,0.15); }
    .food-add {
      padding: 10px 16px; border-radius: 12px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
    }
    .macro-bar-row { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .macro-line { display: flex; flex-direction: column; gap: 3px; }
    .macro-labels { display: flex; justify-content: space-between; font-size: 11px; }
    .macro-lbl { color: var(--muted); }
    .macro-pct { font-weight: 700; }
    .macro-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .macro-fill  { height: 100%; border-radius: 3px; transition: width 1s ease; }

    /* ── BODY DIAGRAM ── */
    .body-diag-wrap { margin-bottom: 4px; }
    .body-diag-gender { display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 6px; }
    .body-diag-gender-btn {
      flex: 1; padding: 3px 4px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 10px; font-family: inherit; cursor: pointer; text-align: center; white-space: nowrap;
    }
    .body-diag-gender-btn.active { background: var(--surface); color: var(--text); border-color: rgba(0,0,0,0.15); }
    .body-diag-gender-btn.male-btn.active { border-color: #06b6d4; color: #06b6d4; }
    .body-diag-gender-btn.female-btn.active { border-color: #ec4899; color: #ec4899; }
    .body-sys-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; justify-content: center; }
    .body-diag-layout { display: flex; gap: 12px; align-items: stretch; }
    .body-diag-svg-col { flex-shrink: 0; width: 100px; display: flex; flex-direction: column; }
    .body-diag-svg-wrap { flex: 1; overflow: hidden; min-height: 0; }
    .body-diag-svg-wrap svg { width: 100%; height: 100%; display: block; }
    .body-diag-right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; height: 300px; overflow: hidden; }
    .body-sys-btn {
      padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      font-size: 10px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.15s, color 0.15s;
      white-space: nowrap; line-height: 1.6;
    }
    .body-sys-btn:hover { background: var(--surface); color: var(--text); }
    .body-sys-btn.active { color: var(--text); border-color: currentColor; background: var(--surface); }
    .body-info-panel { display: flex; flex-direction: column; gap: 5px; }
    .body-info-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .body-info-fn { font-size: 12px; color: var(--text2); line-height: 1.55; }
    .body-info-facts { display: flex; flex-direction: column; gap: 5px; margin-top: 2px; }
    .b-ic { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .b-tx { flex: 1; min-width: 0; }
    .b-tx strong { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 2px; }
    .b-tx span { font-size: 12px; color: var(--text2); line-height: 1.55; }

    .nutrition-item {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 11px 15px; border-bottom: 1px solid var(--border);
    }
    .nutrition-item:last-child { border-bottom: none; }
    .ni-icon { font-size: 20px; flex-shrink: 0; }
    .ni-text { font-size: 13px; color: var(--text2); line-height: 1.55; }
    .ni-text strong { display: block; color: var(--text); margin-bottom: 1px; }

    /* ── GRAPH ── */
    .graph-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
    .graph-period-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
    .graph-periods { display: flex; gap: 5px; flex-shrink: 0; }
    .graph-date-inline { display: flex; gap: 4px; align-items: center; margin-left: auto; }
    .gp-btn { padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s, color 0.15s; }
    .gp-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .graph-info-bar { display: none; }
    .graph-svg-wrap { position: relative; width: 100%; user-select: none; -webkit-user-select: none; cursor: crosshair; }
    .graph-svg-wrap svg { width: 100%; display: block; height: auto; }
    .gy-lbl { position: absolute; left: 3px; font-size: 11px; font-weight: 700; color: var(--muted); transform: translateY(-50%); pointer-events: none; line-height: 1; z-index: 1; background: rgba(8,13,26,0.85); padding: 0 3px; border-radius: 3px; font-family: inherit; }
    .g-cursor { position: absolute; top: 0; bottom: 0; width: 1.5px; pointer-events: none; opacity: 0; }
    .g-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; border: 2.5px solid white; pointer-events: none; opacity: 0; margin-left: -5px; margin-top: -5px; box-shadow: 0 1px 6px rgba(0,0,0,0.2); z-index: 3; }
    .g-tip { position: absolute; background: rgba(8,18,40,0.95); color: white; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: inherit; line-height: 1.5; pointer-events: none; opacity: 0; white-space: nowrap; z-index: 4; top: 4px; transition: opacity 0.15s; }
    .graph-date-input { padding: 4px 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 10px; font-family: inherit; outline: none; width: 100px; }
    .graph-date-apply { padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .graph-date-sep { font-size: 10px; color: var(--muted); }
    .graph-macro-toggle-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .gmt-btn { padding: 4px 11px; border-radius: 20px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; font-family: inherit; opacity: 0.35; }
    .gmt-btn.active { opacity: 1; }

    /* ── BODY SCORE DETAIL ── */
    .bs-breakdown { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .bs-ring-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface2); border-radius: 10px; }
    .bs-ring-icon { font-size: 18px; width: 24px; text-align: center; }
    .bs-ring-name { font-size: 12px; color: var(--text2); flex: 1; }
    .bs-ring-bar-wrap { width: 80px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .bs-ring-bar { height: 100%; border-radius: 3px; }
    .bs-ring-val { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }

    /* trend compare */
    .trend-toggles { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .trend-tog { padding: 4px 9px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); font-size: 10px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; opacity: 0.5; color: var(--text2); }
    .trend-tog.on { opacity: 1; }

    /* blood tests */
    .blood-add-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .blood-select { flex: 1; min-width: 120px; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .blood-val-input { width: 80px; padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .blood-date-input { padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .blood-add-btn { padding: 9px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; background: var(--accent); color: #fff; }
    .blood-entry { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .blood-entry:last-child { border-bottom: none; }
    .blood-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .blood-name { font-size: 12px; color: var(--muted); flex: 1; }
    .blood-val-lbl { font-size: 13px; font-weight: 700; }
    .blood-date-lbl { font-size: 10px; color: var(--muted); }
    .blood-range-lbl { font-size: 10px; color: var(--muted); text-align: right; }
    .no-data-msg { font-size: 12px; color: var(--muted); text-align: center; padding: 12px 0; }

    /* conditions */
    .cond-add-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .cond-input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .cond-status-sel { padding: 9px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .cond-add-btn { padding: 9px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; font-family: inherit; }
    .cond-pill { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); margin-bottom: 6px; }
    .cond-status { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .cond-name-lbl { font-size: 12px; flex: 1; color: var(--text); }
    .cond-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }

    /* bs calendar */
    .bs-cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .bs-cal-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
    .bs-cal-month { font-size: 13px; font-weight: 700; color: var(--text); }
    .bs-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .bs-cal-day-lbl { text-align: center; font-size: 9px; color: var(--muted); padding: 2px; }
    .bs-cal-cell { border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); padding: 4px; min-height: 38px; cursor: pointer; transition: background 0.15s; }
    .bs-cal-cell:hover { background: var(--surface); }
    .bs-cal-cell.today { border-color: var(--accent); }
    .bs-cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
    .bs-cal-dn { font-size: 9px; color: var(--muted); margin-bottom: 3px; }
    .bs-cal-expand { background: var(--surface2); border-radius: 10px; padding: 10px 12px; margin-top: 8px; display: none; }
    .bs-cal-expand.open { display: block; }
    .bs-cal-exp-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; border-bottom: 1px solid var(--border); }
    .bs-cal-exp-row:last-child { border-bottom: none; }

    /* profile panel */
    .profile-tab { padding: 9px 16px; border-radius: 10px 10px 0 0; border: 1px solid var(--border); border-bottom: none; background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .profile-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pf-add-method-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
    .pf-method-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .pf-method-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pf-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
    .pf-section-title { font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .pf-view-toggle { display: flex; gap: 5px; margin-bottom: 12px; }
    .pf-view-btn { padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .pf-view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pf-test-entry { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .pf-test-entry:last-child { border-bottom: none; }
    .pf-test-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pf-test-name { font-size: 12px; color: var(--muted); flex: 1; }
    .pf-test-val { font-size: 13px; font-weight: 700; color: var(--text); }
    .pf-test-date { font-size: 10px; color: var(--muted); }
    .pf-test-range { font-size: 10px; color: var(--muted); text-align: right; min-width: 70px; }
    .pf-suggestion { background: var(--surface2); border-radius: 8px; padding: 8px 10px; margin-top: 6px; font-size: 11px; color: var(--text2); line-height: 1.5; display: none; }
    .pf-suggestion.open { display: block; }
    .pf-suggestion strong { color: var(--text); display: block; margin-bottom: 4px; }
    .pf-sug-tag { display: inline-block; padding: 2px 7px; border-radius: 6px; margin: 2px 2px 2px 0; font-size: 10px; font-weight: 700; }
    .pf-cond-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 8px; box-shadow: var(--shadow-sm); }
    .pf-cond-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; background: var(--surface); }
    .pf-cond-header:hover { background: var(--surface2); }
    .pf-cond-name { font-size: 13px; font-weight: 700; flex: 1; color: var(--text); }
    .pf-cond-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .pf-cond-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border); background: var(--surface); }
    .pf-cond-body.open { display: block; }
    .pf-cond-section-lbl { font-size: 9px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin: 8px 0 4px; }
    .pf-cond-ring-row { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .pf-cond-ring-row:last-child { border-bottom: none; }
    .pf-food-chip { display: inline-block; background: rgba(34,197,94,0.1); color: #16a34a; border-radius: 6px; padding: 3px 8px; font-size: 10px; margin: 2px; }
    .pf-ex-chip { display: inline-block; background: rgba(251,146,60,0.1); color: #ea580c; border-radius: 6px; padding: 3px 8px; font-size: 10px; margin: 2px; }
    .pf-ai-goal { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .pf-ai-goal:last-child { border-bottom: none; }
    .pf-ai-goal-lbl { flex: 1; font-size: 12px; color: var(--text2); }
    .pf-ai-goal-val { font-size: 12px; font-weight: 700; }
    .pf-bulk-area { width: 100%; min-height: 100px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-family: monospace; resize: vertical; outline: none; box-sizing: border-box; }
    .pf-parse-btn { margin-top: 8px; padding: 9px 16px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .pf-upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; margin-bottom: 10px; }
    .pf-upload-area:hover { border-color: var(--accent); background: rgba(34,197,94,0.03); }
    .pf-search-wrap { position: relative; margin-bottom: 10px; }
    .pf-cond-search { width: 100%; padding: 10px 13px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; }
    .pf-cond-search::placeholder { color: var(--muted); }
    .pf-cond-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-height: 180px; overflow-y: auto; z-index: 50; display: none; box-shadow: var(--shadow); }
    .pf-cond-option { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text); }
    .pf-cond-option:last-child { border-bottom: none; }
    .pf-cond-option:hover { background: var(--surface2); }

    /* ── HOME LAYOUT ── */
    .home-scene { display:flex; flex-direction:column; align-items:center; padding:16px 0 16px; }
    .home-score-area { display:flex; flex-direction:column; align-items:center; margin-bottom:20px; position:relative; isolation:isolate; }
    .score-glow-bg { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:100vw; height:120%; pointer-events:none; z-index:-1; }
    /* Ring row */
    .rings-scroll-outer { width:100%; padding:0 8px; }
    .rings-scroll-inner { display:flex; flex-wrap:nowrap; justify-content:center; gap:4px; padding:8px 0 12px; }
    .ring-tile-h { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 2px 6px; border-radius:16px; transition:opacity 0.3s ease, transform 0.2s cubic-bezier(.34,1.56,.64,1); flex:1; min-width:0; -webkit-tap-highlight-color:transparent; }
    .ring-tile-h:active { transform:scale(0.88); }
    .ring-tile-h .rmini { position:relative; width:48px; height:48px; }
    .ring-tile-h .rmini svg { display:block; }
    .ring-tile-h .r-bloom { fill:none; stroke-linecap:round; transition:stroke-dashoffset 1.4s ease; }
    .ring-tile-h .r-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:17px; text-shadow:0 0 8px rgba(0,0,0,0.6); }
    .ring-tile-h .r-pct { font-size:11px; font-weight:900; letter-spacing:-0.3px; }
    .ring-tile-h .r-name { font-size:7px; color:var(--muted); text-transform:uppercase; letter-spacing:.2px; text-align:center; line-height:1.2; width:100%; }
    /* Sticky ring row */
    .rings-sticky { position:sticky; top:52px; z-index:10; width:calc(100% + 32px); margin-left:-16px; padding:0 16px 0; background: radial-gradient(ellipse 70% 45% at 15% -5%, rgba(99,102,241,0.18) 0%, transparent 65%), radial-gradient(ellipse 55% 35% at 90% 105%, rgba(14,165,233,0.14) 0%, transparent 65%), radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59,130,246,0.05) 0%, transparent 70%), linear-gradient(160deg, #070b15 0%, #0d1a2e 60%, #070f1e 100%); background-attachment:fixed; }
    /* Preview panel */
    .ring-preview-wrap { width:100%; padding:0 0 48px; }
    @keyframes previewIn { from{opacity:0;transform:translateY(8px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .rp-card { background:linear-gradient(135deg,var(--surface) 0%,rgba(22,32,64,0.9) 100%); border:1px solid var(--border); border-radius:18px; padding:16px; box-shadow:var(--shadow); animation:previewIn 0.22s cubic-bezier(.34,1.56,.64,1); }
    .rp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px; }
    .rp-left { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
    .rp-icon { font-size:20px; line-height:1; flex-shrink:0; }
    .rp-name { font-size:15px; font-weight:800; color:var(--text); }
    .rp-trend { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
    .rp-open-btn { padding:7px 13px; border-radius:10px; border:none; font-size:12px; font-weight:700; cursor:pointer; color:#fff; font-family:inherit; white-space:nowrap; flex-shrink:0; }
    .rp-stats { display:flex; gap:7px; margin-bottom:10px; }
    .rp-stat { flex:1; background:var(--surface2); border-radius:10px; padding:8px 10px; border:1px solid rgba(100,160,255,0.07); }
    .rp-stat-lbl { font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:3px; }
    .rp-stat-val { font-size:15px; font-weight:800; line-height:1.1; }
    .rp-stat-sub { font-size:10px; color:var(--muted); }
    .rp-bar-wrap { height:4px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; margin-bottom:11px; }
    .rp-bar-fill { height:100%; border-radius:2px; transition:width 0.9s ease; }
    .rp-why { font-size:12px; color:var(--text2); line-height:1.6; }
    .rp-why strong { color:var(--text); }

    /* ── DEVICE DATA ── */
    .device-badge-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .device-badge { background:rgba(59,130,246,0.18); color:#60a5fa; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }
    .device-source-lbl { font-size:11px; color:var(--muted); }
    .device-entry { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .device-entry:last-child { border-bottom:none; }
    .device-time { color:var(--muted); font-size:12px; }
    .device-val { font-weight:700; }

    /* ── CALENDAR GRAPH BUTTON ── */
    .gp-cal-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:4px 8px; cursor:pointer; font-size:13px; margin-left:auto; }
    .graph-cal-panel { background:var(--surface2); border-radius:12px; padding:12px; margin-bottom:8px; border:1px solid var(--border); }
  </style>
</head>
<body>

<!-- Background decorations -->
<div id="deco-wrap" style="position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden">
  <!-- Corner glows -->
  <div style="position:absolute;top:-120px;left:-120px;width:420px;height:420px;background:radial-gradient(circle,rgba(99,102,241,0.18) 0%,transparent 68%)"></div>
  <div style="position:absolute;bottom:-100px;right:-100px;width:380px;height:380px;background:radial-gradient(circle,rgba(14,165,233,0.16) 0%,transparent 68%)"></div>
  <div style="position:absolute;top:35%;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(139,92,246,0.11) 0%,transparent 70%)"></div>
  <div style="position:absolute;bottom:20%;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(6,182,212,0.1) 0%,transparent 70%)"></div>
  <!-- Dot grid -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.055" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
        <circle cx="1.5" cy="1.5" r="1.5" fill="#7090c8"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dots)"/>
  </svg>
  <!-- Diagonal lines top-right -->
  <svg style="position:absolute;top:0;right:0;width:220px;height:220px;opacity:0.04" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="diag" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="18" stroke="#a5b4fc" stroke-width="1"/>
    </pattern></defs>
    <rect width="220" height="220" fill="url(#diag)"/>
  </svg>
  <!-- Subtle arc lines bottom-left -->
  <svg style="position:absolute;bottom:-20px;left:-20px;width:200px;height:200px;opacity:0.06" xmlns="http://www.w3.org/2000/svg">
    <circle cx="0" cy="200" r="80"  fill="none" stroke="#38bdf8" stroke-width="1"/>
    <circle cx="0" cy="200" r="120" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <circle cx="0" cy="200" r="160" fill="none" stroke="#38bdf8" stroke-width="1"/>
  </svg>
  <!-- Hex ring top-center -->
  <svg style="position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:160px;height:160px;opacity:0.05" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <polygon points="50,18 78,33 78,67 50,82 22,67 22,33" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <polygon points="50,31 66,40 66,60 50,69 34,60 34,40" fill="none" stroke="#a5b4fc" stroke-width="1"/>
  </svg>
</div>

<div id="bar-home">
  <span class="logo">BODY SCORE</span>
  <span class="t-date" id="nav-date"></span>
  <div class="avatar" onclick="openProfile()" style="cursor:pointer;font-size:10px;letter-spacing:0.5px">CP</div>
</div>

<div id="bar-detail" style="display:none">
  <button class="back-btn" onclick="goHome()">&#8249; Back</button>
  <span class="t-date" id="det-ring-name"></span>
  <div style="width:56px"></div>
</div>

<main>
  <div id="v-home">
    <div class="home-scene">
      <div class="home-score-area">
        <div class="score-lbl">Today's Body Score</div>
        <div class="score-ring-wrap" style="cursor:pointer" onclick="openBodyScore()">
          <svg id="score-svg" width="160" height="160" viewBox="0 0 160 160" style="filter:drop-shadow(0 0 10px #22c55e88)">
            <circle class="s-bg" cx="80" cy="80" r="65"/>
            <circle id="score-bloom" cx="80" cy="80" r="65" fill="none" stroke="#22c55e"
              stroke-width="20" stroke-linecap="round" opacity="0.13"
              stroke-dasharray="408" stroke-dashoffset="408" transform="rotate(-90 80 80)"
              style="transition:stroke-dashoffset 1.3s cubic-bezier(.4,0,.2,1)"/>
            <circle class="s-fill" id="score-ring" cx="80" cy="80" r="65"
              stroke="#22c55e" transform="rotate(-90 80 80)"/>
          </svg>
          <div class="score-center">
            <div class="score-num" id="score-num" style="color:#22c55e">0</div>
            <div class="score-denom">/ 100</div>
          </div>
        </div>
        <div class="score-delta" id="score-delta" style="cursor:pointer" onclick="openBodyScore()"></div>
        <div id="score-glow-bg" class="score-glow-bg" style="background:radial-gradient(ellipse 70% 80% at 50% 50%,rgba(34,197,94,0.22) 0%,transparent 70%)"></div>
      </div>
      <div class="rings-sticky">
        <div class="rings-scroll-outer">
          <div class="rings-scroll-inner" id="ring-row"></div>
        </div>
        <div style="width:100%;padding:0 0;margin-top:2px;">
          <div id="ring-divider-line" style="height:2px;background:linear-gradient(90deg,transparent 0%,rgba(100,160,255,0.5) 30%,rgba(100,160,255,0.85) 50%,rgba(100,160,255,0.5) 70%,transparent 100%);box-shadow:0 0 10px rgba(100,160,255,0.4),0 0 24px rgba(100,160,255,0.18)"></div>
        </div>
      </div>
      <div class="ring-preview-wrap">
        <div id="ring-preview"></div>
      </div>
    </div>
  </div>

  <div id="v-detail" style="display:none"></div>
</main>

<div id="profile-panel" style="display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;">
  <div style="position:sticky;top:0;background:rgba(7,11,21,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 20px 0;z-index:1">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-weight:900;font-size:16px;letter-spacing:0.5px;color:var(--text)">Chris Palmer</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Health Profile</div>
      </div>
      <button onclick="closeProfile()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <div style="display:flex;gap:4px;padding-bottom:1px" id="profile-tabs">
      <button class="profile-tab active" id="ptab-tests" onclick="switchProfileTab('tests')">📋 Test Results</button>
      <button class="profile-tab" id="ptab-conditions" onclick="switchProfileTab('conditions')">🩺 Conditions</button>

function init() {
  var d = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  document.getElementById('nav-date').textContent = d;

  var s = SCORE.val, circ = 408, off = circ - circ * s / 100;
  var ring = document.getElementById('score-ring');
  var num  = document.getElementById('score-num');
  var delt = document.getElementById('score-delta');
  var col  = getScoreColor(s);
  ring.style.stroke = col;
  num.style.color = col;
  var bloom = document.getElementById('score-bloom');
  var svg   = document.getElementById('score-svg');
  if (bloom) bloom.style.stroke = col;
  if (svg)   svg.style.filter   = 'drop-shadow(0 0 12px ' + col + '90)';
  var glowBg = document.getElementById('score-glow-bg');
  if (glowBg) glowBg.style.background = 'radial-gradient(ellipse 70% 80% at 50% 50%,' + col + '38 0%,' + col + '08 45%,transparent 70%)';
  setTimeout(function() {
    ring.style.strokeDashoffset = off;
    if (bloom) bloom.style.strokeDashoffset = off;
  }, 80);
  var n = 0, step = s / 60;
  var t = setInterval(function() {
    n = Math.min(n + step, s); num.textContent = Math.round(n);
    if (n >= s) clearInterval(t);
  }, 16);
  delt.textContent = (SCORE.delta >= 0 ? '↑ +' : '↓ ') + Math.abs(SCORE.delta) + ' from yesterday';
  delt.style.color = SCORE.delta >= 0 ? '#22c55e' : '#f87171';

  renderRingRow();

  var ringsDimmed = false;
  window.addEventListener('scroll', function() {
    var homeEl = document.getElementById('v-home');
    if (!homeEl || homeEl.style.display === 'none') return;
    var scrolled = (window.scrollY || window.pageYOffset) > 220;
    if (scrolled === ringsDimmed) return;
    ringsDimmed = scrolled;
    var tiles = document.querySelectorAll('.ring-tile-h');
    for (var i = 0; i < tiles.length; i++) {
      tiles[i].style.opacity = scrolled ? (tiles[i].classList.contains('active') ? '1' : '0.15') : '1';
    }
  }, {passive:true});
}

function getScoreColor(score) {
  // smooth gradient: red(0) → orange(50) → yellow(70) → green(85-100)
  var hue;
  if (score <= 50)      hue = (score / 50) * 28;
  else if (score <= 70) hue = 28 + ((score - 50) / 20) * 27;
  else if (score <= 85) hue = 55 + ((score - 70) / 15) * 25;
  else                  hue = 80 + ((score - 85) / 15) * 52;
  var sat = score <= 50 ? 90 : 85;
  var lit = score <= 50 ? 52 : 54;
  return 'hsl(' + hue.toFixed(1) + ',' + sat + '%,' + lit + '%)';
}

function updateRingDivider(color) {
  var el = document.getElementById('ring-divider-line');
  if (!el) return;
  el.style.background = 'linear-gradient(90deg,transparent 0%,' + color + 'aa 25%,' + color + ' 50%,' + color + 'aa 75%,transparent 100%)';
  el.style.boxShadow = '0 0 14px ' + color + '88,0 0 32px ' + color + '44,0 1px 0 rgba(255,255,255,0.08)';
}

var wheelActiveIdx = 0;

function renderRingRow() {
  var row = document.getElementById('ring-row');
  if (!row) return;
  var html = '';
  for (var i = 0; i < RINGS.length; i++) {
    var ring = RINGS[i];
    var Rv = 18, circ = +(2 * Math.PI * Rv).toFixed(2);
    var off = +(circ - circ * ring.pct).toFixed(2);
    var isActive = i === wheelActiveIdx;
    var pct = Math.round(ring.pct * 100) + '%';
    html += '<div class="ring-tile-h' + (isActive ? ' active' : '') + '" onclick="setWheelActive(' + i + ')">'
      + '<div class="rmini"><svg width="48" height="48" viewBox="0 0 48 48">'
      + '<circle cx="24" cy="24" r="' + Rv + '" fill="none" stroke="' + ring.color + '" stroke-width="6" opacity="0.15" stroke-linecap="round"/>'
      + '<circle class="r-bloom" cx="24" cy="24" r="' + Rv + '" stroke="' + ring.color + '"'
      + ' stroke-width="10" stroke-dasharray="' + circ + '" stroke-dashoffset="' + circ + '"'
      + ' data-off="' + off + '" transform="rotate(-90 24 24)" opacity="0.14"/>'
      + '<circle class="r-fill" cx="24" cy="24" r="' + Rv + '" stroke="' + ring.color + '"'
      + ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + circ + '"'
      + ' data-off="' + off + '" transform="rotate(-90 24 24)"/>'
      + '</svg><div class="r-icon">' + ring.icon + '</div></div>'
      + '<div class="r-pct" style="color:' + ring.color + '">' + pct + '</div>'
      + '<div class="r-name">' + ring.name + '</div>'
      + '</div>';
  }
  row.innerHTML = html;
  setTimeout(function() {
    var fills = row.querySelectorAll('.r-fill, .r-bloom');
    for (var i = 0; i < fills.length; i++) {
      fills[i].style.strokeDashoffset = fills[i].getAttribute('data-off');
    }
  }, 200);
  updateRingDivider(RINGS[wheelActiveIdx].color);
  renderRingPreview(wheelActiveIdx);
}

function setWheelActive(idx) {
  wheelActiveIdx = idx;
  var tiles = document.querySelectorAll('.ring-tile-h');
  var scrolled = (window.scrollY || window.pageYOffset) > 220;
  for (var i = 0; i < tiles.length; i++) {
    var act = i === idx;
    tiles[i].classList.toggle('active', act);
    tiles[i].style.opacity = scrolled ? (act ? '1' : '0.3') : '1';
  }
  updateRingDivider(RINGS[idx].color);
  renderRingPreview(idx);
}

function wheelStep(dir) {
  var next = (wheelActiveIdx + dir + RINGS.length) % RINGS.length;
  setWheelActive(next);
}

function wireCollapsibles(container) {
  var secs = container.querySelectorAll('.sec');
  for (var i = 0; i < secs.length; i++) {
    (function(sec) {
      var body = sec.nextElementSibling;
      while (body && !body.classList.contains('sec')) {
        body.classList.add('sec-body');
        body = body.nextElementSibling;
      }
      sec.addEventListener('click', function() {
        sec.classList.toggle('collapsed');
        var el = sec.nextElementSibling;
        while (el && !el.classList.contains('sec')) {
          el.classList.toggle('collapsed', sec.classList.contains('collapsed'));
          el = el.nextElementSibling;
        }
      });
    })(secs[i]);
  }
}

// ring-specific scale for mock data
var RING_SCALES = [
  { base:49, amp:6,    min:35, max:75,  unit:'ms',         better:'high', target:55    },  // HRV
  { base:7,  amp:0.8,  min:4,  max:9.5, unit:'hrs',        better:'high', target:7.5   },  // Sleep
  { base:28, amp:18,   min:0,  max:70,  unit:'min',        better:'high', target:45    },  // Zone2
  { base:6800, amp:2200, min:1500, max:15000, unit:'steps', better:'high', nodec:true, target:8000 },  // Steps
  { base:72, amp:14,   min:40, max:100, unit:'%',          better:'high', nodec:true, target:85   },  // Macros
  { base:55, amp:25,   min:10, max:120, unit:'oz',         better:'high', nodec:true, target:80   },  // Water
  { base:63, amp:4,    min:50, max:78,  unit:'bpm',        better:'low',  nodec:true, target:60   },  // RHR
  { base:42, amp:3.5,  min:20, max:70,  unit:'ml/kg/min',  better:'high', target:45   },  // VO2Max
];

function genMockData(ringIdx) {
  var sc = RING_SCALES[ringIdx];
  var data = [];
  var val = sc.base;
  for (var i = 364; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    // gentle trend toward current ring value + noise
    val += (sc.base - val) * 0.03 + (Math.random() - 0.48) * sc.amp * 0.4;
    val = Math.max(sc.min, Math.min(sc.max, val));
    // some days missing (10%)
    if (Math.random() > 0.1) {
      data.push({ d: d, v: +val.toFixed(1) });
    }
  }
  return data;
}

// cache so we don't regenerate each render
var mockDataCache = {};
function getMockData(idx) {
  if (!mockDataCache[idx]) mockDataCache[idx] = genMockData(idx);
  return mockDataCache[idx];
}

function fmtVal(v, sc) {
  if (sc.nodec) return Math.round(v);
  return v < 10 ? v.toFixed(1) : v.toFixed(0);
}

  var startVal = cache && cache.length ? cache[cache.length-1].v : sc.base;

    pct = tgt >= sc.base ? 0 : Math.max(0, Math.min(100, Math.round((sc.base - currentVal) / (sc.base - tgt) * 100)));

    pct = Math.max(0, Math.min(100, Math.round(tgt > 0 ? currentVal / tgt * 100 : 0)));
