function pfParsePaste() {
  var text = (document.getElementById('pf-paste-area').value || '').trim();
  if (!text) return;
  var lines = text.split(/\n/);
  var added = 0;
  var today = new Date().toISOString().split('T')[0];
  for (var li = 0; li < lines.length; li++) {
    var line = lines[li].trim();
    if (!line) continue;
    var m1 = line.match(/^(\d{4}-\d{2}-\d{2})\s*[,\t]\s*([^,\t]+?)\s*[,\t]\s*(\d+\.?\d*)$/);
    if (m1) { bloodEntries.push({name:m1[2].trim(), val:parseFloat(m1[3]), date:m1[1]}); added++; continue; }
    var m2 = line.match(/^([^:]+?):\s*(\d+\.?\d*)\s*(\S+)?$/);
    if (m2) {
      var matched = null;
      for (var ti = 0; ti < BLOOD_TESTS_DEF.length; ti++) {
        if (BLOOD_TESTS_DEF[ti].name.toLowerCase() === m2[1].trim().toLowerCase()) { matched = BLOOD_TESTS_DEF[ti].name; break; }
      }
      if (matched) { bloodEntries.push({name:matched, val:parseFloat(m2[2]), date:today}); added++; continue; }
    }
    for (var ti2 = 0; ti2 < BLOOD_TESTS_DEF.length; ti2++) {
      var tn = BLOOD_TESTS_DEF[ti2].name.toLowerCase();
      if (line.toLowerCase().indexOf(tn) !== -1) {
        var numMatch = line.match(/(\d+\.?\d*)/);
        if (numMatch) {
          var dateMatch = line.match(/\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{4}/);
          var parsedDate = today;
          if (dateMatch) { parsedDate = new Date(dateMatch[0]).toISOString().split('T')[0] || today; }
          bloodEntries.push({name:BLOOD_TESTS_DEF[ti2].name, val:parseFloat(numMatch[1]), date:parsedDate});
          added++; break;
        }
      }
    }
  }
  saveBlood();
  var msg = document.getElementById('pf-parse-msg');
  if (msg) msg.textContent = added > 0 ? '✓ Imported ' + added + ' result' + (added>1?'s':'') : 'No recognized tests found. Try manual entry.';
  if (added > 0) setTimeout(function(){ switchProfileTab('tests'); }, 1200);
}

function pfHandleFile(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result || '';
    var ta = document.getElementById('pf-paste-area');
    if (!ta) {
      pfAddMethod = 'paste';
      switchProfileTab('tests');
      setTimeout(function(){
        var ta2 = document.getElementById('pf-paste-area');
        if (ta2) { ta2.value = text; pfParsePaste(); }
      }, 50);
    } else { ta.value = text; pfParsePaste(); }
  };
  reader.readAsText(input.files[0]);
}

function renderTestTable() {
  if (!bloodEntries.length) return '<div class="no-data-msg" style="padding:16px 0">No test results yet. Add your first result above.</div>';
  var rows = bloodEntries.map(function(e, ei) {
    var def = null;
    for (var k = 0; k < BLOOD_TESTS_DEF.length; k++) { if (BLOOD_TESTS_DEF[k].name === e.name) { def = BLOOD_TESTS_DEF[k]; break; } }
    var col = '#7a9480';
    if (def) { for (var rk = 0; rk < def.ranges.length; rk++) { var rng = def.ranges[rk]; if (e.val >= rng[0] && e.val < rng[1]) { col = rng[2]; break; } } }
    var unit = def ? def.unit : '';
    var rlbl = def ? getRangeLabel(def, e.val) : '';
    var sug = getTestSuggestion(e.name, e.val, def);
    var sugHtml = sug ? '<div class="pf-suggestion" id="pfsug-' + ei + '"><strong>💡 Improvement Tips</strong>' + sug + '</div>' : '';
    var toggleSug = sug ? ' onclick="pfToggleSug(\'pfsug-' + ei + '\')"' : '';
    return '<div class="pf-test-entry" style="flex-direction:column;align-items:stretch;cursor:' + (sug?'pointer':'default') + '"' + toggleSug + '>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<div class="pf-test-dot" style="background:' + col + '"></div>'
      + '<div class="pf-test-name">' + e.name + '</div>'
      + '<div class="pf-test-val" style="color:' + col + '">' + e.val + ' ' + unit + '</div>'
      + '<div class="pf-test-date">' + e.date + '</div>'
      + '<div class="pf-test-range">' + rlbl + (sug ? ' 💡' : '') + '</div>'
      + '</div>'
      + sugHtml
      + '</div>';
  }).join('');
  return '<div>' + rows + '</div>';
}

function pfToggleSug(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function getTestSuggestion(name, val, def) {
  if (!def) return '';
  var col = '';
  for (var k = 0; k < def.ranges.length; k++) { var rng = def.ranges[k]; if (val >= rng[0] && val < rng[1]) { col = rng[2]; break; } }
  if (col === '#4ade80') return '';
  var suggestions = {
    'HbA1c': { high: 'HbA1c above 5.7% signals pre-diabetes risk. <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Zone 2 5×/week</span> <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Post-meal walks</span><br>🥗 <span class="pf-food-chip">Low-GI carbs</span> <span class="pf-food-chip">Apple cider vinegar</span> <span class="pf-food-chip">Berries</span>' },
    'LDL': { high: 'Elevated LDL. <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">150+ min cardio/week</span><br>🥗 <span class="pf-food-chip">Oats (beta-glucan)</span> <span class="pf-food-chip">Psyllium husk</span> <span class="pf-food-chip">Olive oil</span> <span class="pf-food-chip">Plant sterols</span>' },
    'HDL': { low: 'Low HDL (protective cholesterol). <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Zone 2 cardio raises HDL 8-10%</span><br>🥗 <span class="pf-food-chip">Olive oil</span> <span class="pf-food-chip">Avocado</span> <span class="pf-food-chip">Fatty fish</span>' },
    'Triglycerides': { high: 'High triglycerides. <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Cardio reduces TG 20-30%</span><br>🥗 <span class="pf-food-chip">Cut refined sugar</span> <span class="pf-food-chip">Omega-3 fish oil</span> <span class="pf-food-chip">No alcohol</span>' },
    'Fasting Glucose': { high: 'Elevated fasting glucose. <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Post-meal walks mandatory</span> <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Resistance training</span><br>🥗 <span class="pf-food-chip">Low-GI only</span> <span class="pf-food-chip">Berries over fruit</span>' },
    'CRP': { high: 'Elevated inflammation marker. <br>🏃 <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Zone 2 reduces CRP 30-40%</span><br>🥗 <span class="pf-food-chip">Omega-3s</span> <span class="pf-food-chip">Turmeric</span> <span class="pf-food-chip">Dark leafy greens</span>' },
    'Vitamin D': { low: 'Vitamin D deficiency is very common. <br>💊 Supplement 2000-5000 IU/day with K2.<br>☀️ 20 min morning sunlight daily.<br>🥗 <span class="pf-food-chip">Fatty fish</span> <span class="pf-food-chip">Egg yolks</span> <span class="pf-food-chip">Fortified milk</span>' },
    'Testosterone': { low: 'Low testosterone. <br>🏋️ <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Heavy resistance training 3×/week</span> <span class="pf-sug-tag" style="background:rgba(251,146,60,0.2);color:#fb923c">Sleep 8+ hrs</span><br>🥗 <span class="pf-food-chip">Zinc-rich foods</span> <span class="pf-food-chip">Vitamin D</span> <span class="pf-food-chip">Healthy fats</span>' },
    'TSH': { high: 'Elevated TSH suggests hypothyroidism risk. Consider thyroid panel with doctor.<br>🥗 <span class="pf-food-chip">Selenium (Brazil nuts)</span> <span class="pf-food-chip">Iodine</span> <span class="pf-food-chip">Vitamin D</span>' },
    'Ferritin': { low: 'Low ferritin = iron deficiency. <br>🥗 <span class="pf-food-chip">Red meat (heme iron)</span> <span class="pf-food-chip">Liver</span> <span class="pf-food-chip">Vitamin C with iron foods</span><br>⚠️ Avoid coffee/tea around iron-rich meals' }
  };
  var s = suggestions[name];
  if (!s) return '';
  if (col === '#f87171' || col === '#facc15') {
    var isHigh = def.ranges[0][2] === '#4ade80';
    if (!isHigh && s.low) return s.low;
    if (isHigh && s.high) return s.high;
    if (s.high) return s.high;
    if (s.low) return s.low;
  }
  return '';
}

function renderTestGraph() {
  var testNames = [];
  for (var i = 0; i < bloodEntries.length; i++) {
    if (testNames.indexOf(bloodEntries[i].name) === -1) testNames.push(bloodEntries[i].name);
  }
  if (!testNames.length) return '<div class="no-data-msg" style="padding:16px 0">No test results to graph yet.</div>';

  if (!pfSelectedTest || testNames.indexOf(pfSelectedTest) === -1) pfSelectedTest = testNames[0];

  var tabs = '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">'
    + testNames.map(function(n){ return '<button style="padding:4px 10px;border-radius:8px;border:1px solid ' + (n===pfSelectedTest?'#22c55e':'rgba(0,0,0,0.07)') + ';background:' + (n===pfSelectedTest?'#22c55e':'#f0f3f0') + ';color:' + (n===pfSelectedTest?'#fff':'#3a5040') + ';font-size:10px;font-weight:700;cursor:pointer;font-family:inherit" onclick="pfSelectTestGraph(\'' + n.replace(/'/g,'\\\'') + '\')">' + n + '</button>'; }).join('')
    + '</div>';

  var entries = bloodEntries.filter(function(e){ return e.name === pfSelectedTest; }).sort(function(a,b){ return a.date > b.date ? 1 : -1; });
  if (entries.length < 2) return tabs + '<div class="no-data-msg">Need 2+ entries to graph. Add more results.</div>';

  var def = null;
  for (var k = 0; k < BLOOD_TESTS_DEF.length; k++) { if (BLOOD_TESTS_DEF[k].name === pfSelectedTest) { def = BLOOD_TESTS_DEF[k]; break; } }
  var vals = entries.map(function(e){ return e.val; });
  var minV = Math.min.apply(null, vals), maxV = Math.max.apply(null, vals);
  var pad = (maxV - minV) * 0.2 || 5;
  var lo = minV - pad, hi = maxV + pad;
  var W = 320, H = 130, pL = 40, pR = 10, pT = 10, pB = 26;
  var cW = W-pL-pR, cH = H-pT-pB;
  function xp(ii) { return pL + ii/(entries.length-1)*cW; }
  function yp(v) { return pT + cH - (v-lo)/(hi-lo)*cH; }
  var col = def ? '#4ade80' : '#60a5fa';
  var lp = entries.map(function(e,ii){ return (ii===0?'M':'L')+xp(ii).toFixed(1)+','+yp(e.val).toFixed(1); }).join(' ');
  var ap = lp + ' L'+xp(entries.length-1).toFixed(1)+','+(pT+cH)+' L'+pL+','+(pT+cH)+' Z';
  var dots = entries.map(function(e,ii){
    var dc = '#7a9480';
    if (def) { for (var rk=0;rk<def.ranges.length;rk++){var rng2=def.ranges[rk]; if(e.val>=rng2[0]&&e.val<rng2[1]){dc=rng2[2];break;}} }
    return '<circle cx="'+xp(ii).toFixed(1)+'" cy="'+yp(e.val).toFixed(1)+'" r="3.5" fill="'+dc+'" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>';
  }).join('');
  var xlbls = '';
  var xstep = Math.max(1,Math.floor(entries.length/4));
  for (var xi=0;xi<entries.length;xi+=xstep) {
    xlbls += '<text x="'+xp(xi).toFixed(1)+'" y="'+(H-6)+'" fill="#7a9480" font-size="7" text-anchor="middle">'+entries[xi].date.slice(5)+'</text>';
  }
  var ylbls = '';
  for (var yt=0;yt<=2;yt++) {
    var tv2 = lo+(hi-lo)*yt/2;
    ylbls += '<text x="'+(pL-3)+'" y="'+(yp(tv2)+3)+'" fill="#7a9480" font-size="7" text-anchor="end">'+tv2.toFixed(1)+'</text>';
    ylbls += '<line x1="'+pL+'" y1="'+yp(tv2)+'" x2="'+(W-pR)+'" y2="'+yp(tv2)+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
  }
  var refLines = '';
  if (def) {
    var normRange = def.ranges[0];
    if (normRange[2]==='#4ade80') {
      if (normRange[1] < hi && normRange[1] > lo) refLines += '<line x1="'+pL+'" y1="'+yp(normRange[1])+'" x2="'+(W-pR)+'" y2="'+yp(normRange[1])+'" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>';
      if (normRange[0] > lo && normRange[0] < hi) refLines += '<line x1="'+pL+'" y1="'+yp(normRange[0])+'" x2="'+(W-pR)+'" y2="'+yp(normRange[0])+'" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>';
    }
  }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px"><defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'
    + ylbls + refLines
    + '<path d="'+ap+'" fill="url(#tg)"/>'
    + '<path d="'+lp+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/>'
    + dots + xlbls + '</svg>';
  var unit = def ? def.unit : '';
  return tabs + '<div style="font-size:10px;color:#7a9480;margin-bottom:6px">'+pfSelectedTest+' ('+unit+') — dashed lines = reference range</div>' + svg;
}

function pfSelectTestGraph(name) {
  pfSelectedTest = name;
  var el = document.getElementById('profile-content');
  if (el) el.innerHTML = renderTestResultsPanel();
}

function initTestGraphIfNeeded() {
  // graph renders synchronously
}

function renderConditionsPanel() {
  var searchHtml = '<div class="pf-search-wrap">'
    + '<input class="pf-cond-search" id="pf-cond-search" type="text" placeholder="Search medical conditions..." autocomplete="off" oninput="pfCondSearchInput(this.value)" onfocus="pfShowCondDD()" onblur="setTimeout(pfHideCondDD,200)">'
    + '<div class="pf-cond-dropdown" id="pf-cond-dd"></div>'
    + '</div>';

  var condCards = conditions.length
    ? conditions.map(function(c, ci) {
        var guide = CONDITION_GUIDES[c.name];
        var statusColors = { Active:'#f87171', Monitoring:'#facc15', Resolved:'#4ade80' };
        var sc = statusColors[c.status] || '#7a9480';
        var isOpen = pfOpenCond === c.name;
        var bodyHtml = '';
        if (isOpen && guide) {
          var ringRows = guide.rings.map(function(rr) {
            return '<div class="pf-cond-ring-row"><div style="font-size:16px;width:22px;flex-shrink:0">' + RINGS[rr[0]].icon + '</div><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#0f1c12">' + rr[1] + '</div><div style="font-size:11px;color:#7a9480;line-height:1.4;margin-top:1px">' + rr[2] + '</div></div></div>';
          }).join('');
          var foodChips = guide.food.map(function(f){ return '<span class="pf-food-chip">' + f + '</span>'; }).join('');
          var exChips = guide.exercise.map(function(x){ return '<span class="pf-ex-chip">' + x + '</span>'; }).join('');
          bodyHtml = '<div class="pf-cond-body open">'
            + '<div class="pf-cond-section-lbl">Rings to focus on</div>' + ringRows
            + '<div class="pf-cond-section-lbl" style="margin-top:10px">Food recommendations</div><div>' + foodChips + '</div>'
            + '<div class="pf-cond-section-lbl" style="margin-top:8px">Exercise prescription</div><div>' + exChips + '</div>'
            + '<div style="font-size:10px;color:#7a9480;margin-top:10px;border-top:1px solid rgba(0,0,0,0.07);padding-top:8px">Always discuss changes with your physician before adjusting treatments or medications.</div>'
            + '</div>';
        } else if (isOpen) {
          bodyHtml = '<div class="pf-cond-body open"><div style="font-size:12px;color:#7a9480;padding:4px 0">General guidance: discuss management with your healthcare provider and track relevant rings for progress.</div></div>';
        }
        return '<div class="pf-cond-card">'
          + '<div class="pf-cond-header" onclick="toggleCondCard(\'' + c.name.replace(/'/g,"\\'") + '\')">'
          + '<span class="pf-cond-status" style="background:' + sc + '22;color:' + sc + '">' + c.status + '</span>'
          + '<span class="pf-cond-name">' + c.name + '</span>'
          + '<span style="font-size:14px;color:#7a9480">' + (isOpen ? '▲' : '▼') + '</span>'
          + '<button onclick="event.stopPropagation();deleteCondition(' + ci + ')" style="background:none;border:none;color:#7a9480;cursor:pointer;font-size:16px;padding:0 4px">×</button>'
          + '</div>'
          + bodyHtml
          + '</div>';
      }).join('')
    : '<div class="no-data-msg" style="padding:12px 0">No conditions added yet. Search above to add recognized conditions.</div>';

  var aiGoalsHtml = buildAiGoalsHtml();

  return '<div class="pf-section-title" style="margin-bottom:8px">HEALTH CONDITIONS</div>'
    + searchHtml
    + condCards
    + '<div class="sec" style="margin-top:20px">AI Suggested Goals</div>'
    + aiGoalsHtml;
}

function buildAiGoalsHtml() {
  var suggestions = [];
  for (var ci = 0; ci < conditions.length; ci++) {
    var guide = CONDITION_GUIDES[conditions[ci].name];
    if (!guide || !guide.goals) continue;
    for (var gi = 0; gi < guide.goals.length; gi++) {
      var g = guide.goals[gi];
      var exists = false;
      for (var si = 0; si < suggestions.length; si++) { if (suggestions[si].idx === g[0]) { exists = true; break; } }
      if (!exists) suggestions.push({ idx: g[0], newGoal: g[1], reason: conditions[ci].name });
    }
  }
  for (var ri = 0; ri < RINGS.length; ri++) {
    if (RINGS[ri].pct < 0.6) {
      var exists2 = false;
      for (var si2 = 0; si2 < suggestions.length; si2++) { if (suggestions[si2].idx === ri) { exists2 = true; break; } }
      if (!exists2) suggestions.push({ idx: ri, newGoal: RINGS[ri].goal.replace('Goal: ',''), reason: 'Below 60% — priority improvement' });
    }
  }
  if (!suggestions.length) {
    return '<div class="gc gc-p"><div class="no-data-msg">Add health conditions or track rings to get personalized goal suggestions.</div></div>';
  }
  var rows = suggestions.slice(0,6).map(function(s) {
    var r = RINGS[s.idx];
    return '<div class="pf-ai-goal">'
      + '<div style="font-size:18px;width:24px">' + r.icon + '</div>'
      + '<div class="pf-ai-goal-lbl"><strong style="color:#0f1c12">' + r.name + '</strong><br>' + s.reason + '</div>'
      + '<div class="pf-ai-goal-val" style="color:' + r.color + '">' + s.newGoal + '</div>'
      + '</div>';
  }).join('');
  return '<div class="gc">' + rows + '</div>';
}

function pfCondSearchInput(val) {
  pfCondSearch = val;
  var dd = document.getElementById('pf-cond-dd');
  if (!dd) return;
  if (!val) { dd.style.display = 'none'; return; }
  var matches = MEDICAL_CONDITIONS.filter(function(c){ return c.toLowerCase().indexOf(val.toLowerCase()) !== -1; }).slice(0,8);
  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(function(c){
    return '<div class="pf-cond-option" onclick="pfAddCondition(\'' + c.replace(/'/g,"\\'") + '\')">' + c + '</div>';
  }).join('');
  dd.style.display = 'block';
}

function pfShowCondDD() {
  var val = (document.getElementById('pf-cond-search') || {}).value || '';
  if (val) pfCondSearchInput(val);
}

function pfHideCondDD() {
  var dd = document.getElementById('pf-cond-dd');
  if (dd) dd.style.display = 'none';
}

function initCondSearch() {
  // input handler wired via oninput attr
}

function pfAddCondition(name) {
  var already = false;
  for (var i = 0; i < conditions.length; i++) { if (conditions[i].name === name) { already = true; break; } }
  if (!already) { conditions.unshift({ name:name, status:'Active' }); saveConds(); }
  pfHideCondDD();
  var inp = document.getElementById('pf-cond-search');
  if (inp) inp.value = '';
  switchProfileTab('conditions');
}

function toggleCondCard(name) {
  pfOpenCond = (pfOpenCond === name) ? null : name;
  switchProfileTab('conditions');
}

seedSampleData();
init();
</script>
